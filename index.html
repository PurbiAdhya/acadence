let state=loadState();function loadState(){try{return {...structuredClone(defaultState),...JSON.parse(safeGet(STORAGE)||'{}')}}catch(e){return structuredClone(defaultState)}}

 document.getElementById('view-today').innerHTML=`${pageHead('Daily command center',`Good morning, Purbi`,`Focus on what needs attention today. The semester plan stays in the background.`)}<div class="grid dashboard-grid"><div><article class="card welcome-card"><div class="welcome-line"><div><div class="eyebrow">${formatDate(date)}</div><h2>Your day is manageable.</h2><p>You have ${meetings.length} scheduled blocks and ${minutesLabel(totalMin)} of planned faculty work. Keep the day focused rather than filling every available hour.</p></div><button class="btn" data-view="tasks">${icon('check')}Plan tasks</button></div><div class="today-summary"><span class="summary-pill"><strong>${meetings.length}</strong> scheduled blocks</span><span class="summary-pill"><strong>${todayTasks.length}</strong> focus tasks</span><span class="summary-pill"><strong>${completed}</strong> completed</span><span class="summary-pill"><strong>${minutesLabel(totalMin)}</strong> planned work</span></div></article><article class="card section-gap"><div class="card-head"><div><h2>Today’s schedule</h2><p>Classes, office hours, meetings, and protected blocks.</p></div><button class="text-link" data-view="semester">Open calendar</button></div><div class="timeline">${timeline||'<div class="empty">No scheduled blocks today.</div>'}</div></article><article class="card section-gap"><div class="card-head"><div><h2>Focus tasks</h2><p>Only the work you intentionally placed today.</p></div><button class="text-link" data-view="tasks">View all</button></div><div class="task-list">${todayTasks.slice(0,5).map(taskRow).join('')||'<div class="empty">No tasks planned today. Keep the open time or schedule one meaningful task.</div>'}</div></article></div><div><article class="card"><div class="card-head"><div><h2>This week’s workload</h2><p>Preparation, grading, LMS, and administrative work.</p></div><span class="tag auto">${minutesLabel(workloadData().reduce((a,x)=>a+x.min,0))}</span></div>${workloadBars()}</article><article class="card section-gap"><div class="card-head"><div><h2>Courses needing attention</h2><p>The next actionable item for each course.</p></div></div><div class="attention-list">${attention}</div></article><article class="warning-box section-gap">${icon('alert')}<div><strong>One unscheduled task needs a work date.</strong>“Update Canvas welcome module” is due this week but is not placed on your plan. <button class="text-link" data-view="tasks">Schedule it</button></div></article></div></div>`}
function monthRange(){const [y,m]=state.month.split('-').map(Number);const first=new Date(y,m-1,1),start=new Date(first);start.setDate(1-first.getDay());return Array.from({length:42},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return iso(d)})}
function renderMonth(){const cells=monthRange();const ym=state.month;return `<div class="calendar-scroll"><div class="month-grid">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="weekday">${d}</div>`).join('')}${cells.map(d=>{const meetings=meetingsOn(d),acts=eventsOn(d),tasks=tasksOn(d).filter(t=>!t.done);const items=[...meetings.map(m=>({label:m.code,color:m.color,cls:''})),...acts.map(a=>({label:a.title,color:course(a.courseId)?.color||'#b42318',cls:a.type==='Exam'?'exam':''})),...tasks.map(t=>({label:t.title,color:'#df8f2e',cls:'task'}))];return `<div class="day-cell ${d.slice(0,7)!==ym?'out':''} ${d===state.selectedDate?'selected':''} ${d===demoToday?'today':''}" data-date="${d}"><div class="date-num">${parse(d).getDate()}</div>${items.slice(0,4).map(e=>`<div class="cal-event ${e.cls}" style="--course:${e.color}">${esc(e.label)}</div>`).join('')}${items.length>4?`<div class="cal-more">+${items.length-4} more</div>`:''}</div>`}).join('')}</div></div>`}
function renderWeek(){const start=parse(state.selectedDate);start.setDate(start.getDate()-start.getDay()+1);return `<div class="week-layout">${Array.from({length:5},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);const date=iso(d),blocks=[...meetingsOn(date).map(m=>({title:m.code,sub:`${fmtTime(m.start)} · ${m.room}`,color:m.color})),...tasksOn(date).filter(t=>!t.done).map(t=>({title:t.title,sub:minutesLabel(t.minutes),color:'#df8f2e'}))];return `<div class="week-column"><div class="week-column-head ${date===state.selectedDate?'today':''}"><span>${formatDate(date,{weekday:'short',month:'short',day:'numeric'})}</span><span>${blocks.length}</span></div><div class="week-column-body">${blocks.map(b=>`<div class="week-block" style="--course:${b.color}"><strong>${esc(b.title)}</strong><small>${esc(b.sub)}</small></div>`).join('')||'<div class="empty">Open</div>'}</div></div>`}).join('')}</div>`}
function renderSemester(){const title=parse(`${state.month}-01`).toLocaleDateString('en-US',{month:'long',year:'numeric'});document.getElementById('view-semester').innerHTML=`${pageHead('Semester map','Plan the semester','See courses, assessments, faculty tasks, academic dates, and workload in one place.',`<button class="btn" id="copySemester">${icon('copy')}Reuse a course</button><button class="btn primary" data-open-add>${icon('plus')}Add</button>`)}<div class="calendar-shell"><div class="calendar-toolbar"><div class="calendar-nav"><button class="icon-btn" data-month="-1">${icon('chevronLeft')}</button><button class="btn small" id="goToday">Today</button><button class="icon-btn" data-month="1">${icon('chevronRight')}</button></div><div class="calendar-title">${title}</div><div class="segmented"><button class="segment active" data-calendar-mode="month">Month</button><button class="segment" data-calendar-mode="week">Week</button></div></div><div id="calendarBody">${renderMonth()}</div></div>`}
function renderCourses(){document.getElementById('view-courses').innerHTML=`${pageHead('Course workspace','Courses','Manage meeting patterns, assessments, preparation work, and reusable course structures.',`<button class="btn" id="reuseCourse">${icon('copy')}Reuse previous course</button><button class="btn primary" data-add="course">${icon('plus')}Add course</button>`)}<div class="grid course-grid">${state.courses.filter(c=>c.type!=='block').map(c=>{const pct=Math.round(c.meetingsDone/c.meetingsTotal*100),tasks=state.tasks.filter(t=>t.courseId===c.id&&!t.done),acts=state.activities.filter(a=>a.courseId===c.id);return `<article class="card course-card" style="--course:${c.color}"><div class="course-top"><div><div class="course-code">${esc(c.code)}</div><h3>${esc(c.title)}</h3><p>${c.days.join('')} · ${fmtTime(c.start)}–${fmtTime(c.end)} · ${esc(c.room)}</p></div><button class="task-menu" data-course-menu="${c.id}">${icon('more')}</button></div><div class="progress-line"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div><div class="course-stats"><div class="stat"><strong>${c.meetingsDone}/${c.meetingsTotal}</strong><small>Meetings</small></div><div class="stat"><strong>${acts.length}</strong><small>Activities</small></div><div class="stat"><strong>${tasks.length}</strong><small>Open tasks</small></div></div><div class="course-next"><small>Next faculty action</small><strong>${esc(tasks[0]?.title||'Course is currently on track')}</strong></div><div style="display:flex;gap:7px;margin-top:13px"><button class="btn small" data-course-open="${c.id}">Open course</button><button class="btn small" data-add-task-course="${c.id}">${icon('plus','sm')}Task</button></div></article>`}).join('')}</div>`}
function taskMatches(t){const q=state.search.toLowerCase().trim();if(q&&!`${t.title} ${course(t.courseId)?.code||''} ${t.category}`.toLowerCase().includes(q))return false;if(state.taskFilter==='today')return t.plannedDate===state.selectedDate;if(state.taskFilter==='week')return sameWeek(t.plannedDate||t.dueDate);if(state.taskFilter==='unscheduled')return !t.plannedDate&&!t.done;if(state.taskFilter==='completed')return t.done;return true}
function renderTasks(){const visible=state.tasks.filter(taskMatches).sort((a,b)=>(a.plannedDate||'9999').localeCompare(b.plannedDate||'9999')||a.dueDate.localeCompare(b.dueDate));const groups={};visible.forEach(t=>{const k=t.plannedDate||'Unscheduled';(groups[k]??=[]).push(t)});const open=state.tasks.filter(t=>!t.done),mins=open.reduce((a,t)=>a+t.minutes,0),unscheduled=open.filter(t=>!t.plannedDate);document.getElementById('view-tasks').innerHTML=`${pageHead('Faculty workload','Tasks','Plan when work will happen—not only when it is due.',`<button class="btn" id="rebalanceTasks">${icon('rotate')}Balance week</button><button class="btn primary" data-add="task">${icon('plus')}Add task</button>`)}<div class="task-layout"><div class="card"><div class="filter-row">${[['today','Today'],['week','This week'],['unscheduled','Unscheduled'],['all','All open'],['completed','Completed']].map(([k,l])=>`<button class="filter-chip ${state.taskFilter===k?'active':''}" data-task-filter="${k}">${l}</button>`).join('')}</div><div>${Object.entries(groups).map(([date,list])=>`<div class="task-day-group"><div class="task-section-title">${date==='Unscheduled'?date:formatDate(date,{weekday:'long',month:'short',day:'numeric'})}</div><div class="task-list">${list.map(taskRow).join('')}</div></div>`).join('')||'<div class="empty">No tasks in this view.</div>'}</div></div><aside class="task-side-sticky"><article class="card"><div class="card-head"><div><h2>Workload summary</h2><p>Open faculty work in this prototype.</p></div></div><div class="workload-summary"><div class="metric"><strong>${open.length}</strong><small>Open tasks</small></div><div class="metric"><strong>${minutesLabel(mins)}</strong><small>Estimated work</small></div><div class="metric"><strong>${open.filter(t=>t.priority==='high').length}</strong><small>High priority</small></div><div class="metric"><strong>${unscheduled.length}</strong><small>Unscheduled</small></div></div><div class="unscheduled-box"><strong>${unscheduled.length?`${unscheduled.length} task needs a work date`:'Everything is scheduled'}</strong><p>${unscheduled.length?'Acadence can suggest the lightest day before its deadline.':'Your plan has no floating work right now.'}</p><button class="btn small primary" id="scheduleUnscheduled" ${unscheduled.length?'':'disabled'}>${icon('calendarPlus','sm')}Schedule automatically</button></div></article><article class="card section-gap"><div class="card-head"><div><h2>Week distribution</h2><p>Work is balanced by estimated duration.</p></div></div>${workloadBars()}</article></aside></div>`}
function renderReflection(){const recent=[];for(let i=0;i<7;i++){const d=addDays(state.selectedDate,-i);meetingsOn(d).filter(m=>m.type!=='block').forEach(m=>recent.push({...m,date:d}))}const selected=recent[0];document.getElementById('view-reflection').innerHTML=`${pageHead('Teaching reflection','Class pulse','Capture what happened, then carry useful information into the next meeting.',`<button class="btn primary" id="saveReflectionTop">${icon('check')}Save reflection</button>`)}<div class="grid reflection-grid"><article class="card"><div class="card-head"><div><h2>Recent class meetings</h2><p>Select a class to reflect on.</p></div></div><div class="meeting-list">${recent.slice(0,8).map((m,i)=>`<button class="meeting-choice ${i===0?'active':''}" data-reflect-meeting="${m.courseId}|${m.date}"><span class="course-dot" style="--course:${m.color}"></span><span><strong>${esc(m.code)} · ${formatDate(m.date,{weekday:'short',month:'short',day:'numeric'})}</strong><small>${esc(m.title)} · ${fmtTime(m.start)}</small></span></button>`).join('')}</div><div class="reflection-history"><div class="card-head"><div><h2>Recent notes</h2></div></div>${state.reflections.slice().reverse().map(r=>{const c=course(r.courseId);return `<div class="reflection-note" style="--course:${c?.color||'#6c56d8'}"><strong>${esc(c?.code||'Class')} · ${formatDate(r.date,{month:'short',day:'numeric'})}</strong><p>${esc(r.note)}</p></div>`}).join('')}</div></article><article class="card reflection-form" id="reflectionForm">${reflectionForm(selected)}</article></div>`}
function reflectionForm(m){if(!m)return'<div class="empty">No recent class meetings.</div>';return `<div class="card-head"><div><h2>${esc(m.code)} · ${formatDate(m.date,{weekday:'long',month:'long',day:'numeric'})}</h2><p>Use this after class; it should take less than two minutes.</p></div></div><input type="hidden" id="reflectCourse" value="${m.courseId}"><input type="hidden" id="reflectDate" value="${m.date}"><div class="form-field"><label>Student engagement</label><div class="choice-grid" data-choice="engagement">${['Low','Medium','High'].map(x=>`<button class="choice-btn ${x==='High'?'active':''}" type="button">${x}</button>`).join('')}</div></div><div class="form-field section-gap"><label>Pacing</label><div class="choice-grid" data-choice="pacing">${['Behind','On track','Ahead'].map(x=>`<button class="choice-btn ${x==='On track'?'active':''}" type="button">${x}</button>`).join('')}</div></div><div class="form-field section-gap"><label>Clarity</label><div class="choice-grid" data-choice="clarity">${['Revisit','Mixed','Good'].map(x=>`<button class="choice-btn ${x==='Good'?'active':''}" type="button">${x}</button>`).join('')}</div></div><div class="form-field section-gap"><label>Quick note</label><textarea id="reflectNote" placeholder="What worked? What should change next time?"></textarea></div><div class="form-field section-gap"><label>Carry to the next class</label><input id="reflectCarry" placeholder="Example: Finish the last vector example"></div><div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn primary" id="saveReflection">${icon('check')}Save reflection</button></div>`}

le class="card"><div class="card-head"><div><h2>Export & backup</h2><p>Keep the plan portable and recoverable.</p></div></div><div class="grid two"><button class="more-card" id="exportJson"><span class="more-icon">${icon('download')}</span><h3>Download prototype data</h3><p>Save courses, tasks, reflections, and checklist progress as JSON.</p></button><label class="more-card" style="cursor:pointer"><span class="more-icon">${icon('upload')}</span><h3>Import prototype data</h3><p>Restore a prior JSON backup.</p><input id="importJson" type="file" accept="application/json" hidden></label><button class="more-card" onclick="window.print()"><span class="more-icon">${icon('calendar')}</span><h3>Print current view</h3><p>Use your browser to save the active view as a PDF.</p></button><button class="more-card" id="exportIcs"><span class="more-icon">${icon('external')}</span><h3>Export calendar (.ics)</h3><p>Export recurring classes and scheduled activities.</p></button></div></article>`;return `<article class="card"><div class="card-head"><div><h2>Settings & SHC resources</h2><p>Prototype preferences and data controls.</p></div></div><div class="grid two"><div><div class="form-field"><label>Week starts on</label><select><option>Sunday</option><option>Monday</option></select></div><div class="form-field section-gap"><label>Default daily workload limit</label><select><option>3 hours</option><option>2 hours</option><option>4 hours</option></select></div><button class="btn danger section-gap" id="resetPrototype">${icon('trash','sm')}Reset prototype data</button></div><div class="attention-list"><a class="attention-item" href="https://badgerweb.shc.edu/ICS" target="_blank" rel="noopener" style="text-decoration:none;color:inherit"><span class="more-icon" style="margin:0">${icon('external')}</span><div><strong>Badgerweb</strong><small>Student and faculty services</small></div></a><a class="attention-item" href="https://shc.instructure.com" target="_blank" rel="noopener" style="text-decoration:none;color:inherit"><span class="more-icon" style="margin:0">${icon('external')}</span><div><strong>Canvas</strong><small>Course management</small></div></a><a class="attention-item" href="https://libguides.shc.edu" target="_blank" rel="noopener" style="text-decoration:none;color:inherit"><span class="more-icon" style="margin:0">${icon('external')}</span><div><strong>Burke Library</strong><small>Library resources and guides</small></div></a></div></div></article>`}

function taskModal(prefill={}){const cOpts=state.courses.filter(c=>c.type!=='block').map(c=>`<option value="${c.id}" ${prefill.courseId===c.id?'selected':''}>${esc(c.code)}</option>`).join('');return `<div class="modal-head"><div><h2>${prefill.id?'Edit faculty task':'Add faculty task'}</h2><p>Plan when the work will happen, separately from its deadline.</p></div><button class="icon-btn" data-close-modal>${icon('x')}</button></div><form id="taskForm"><div class="modal-body"><input type="hidden" name="id" value="${prefill.id||''}"><div class="form-grid"><div class="form-field full"><label>Task</label><input name="title" required value="${esc(prefill.title||'')}" placeholder="Prepare lecture, grade assignment, update Canvas…"></div><div class="form-field"><label>Course</label><select name="courseId"><option value="">General faculty work</option>${cOpts}</select></div><div class="form-field"><label>Category</label><select name="category">${['Preparation','Assessment','Grading','LMS','Admin','Research'].map(x=>`<option ${prefill.category===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-field"><label>Planned work date</label><input type="date" name="plannedDate" value="${prefill.plannedDate||state.selectedDate}"></div><div class="form-field"><label>Due date</label><input type="date" name="dueDate" value="${prefill.dueDate||state.selectedDate}"></div><div class="form-field"><label>Estimated duration</label><select name="minutes">${[15,25,30,45,60,75,90,120].map(n=>`<option value="${n}" ${Number(prefill.minutes||30)===n?'selected':''}>${minutesLabel(n)}</option>`).join('')}</select></div><div class="form-field"><label>Priority</label><select name="priority">${['low','medium','high'].map(x=>`<option ${prefill.priority===x?'selected':''}>${x[0].toUpperCase()+x.slice(1)}</option>`).join('')}</select></div></div></div><div class="modal-foot">${prefill.id?`<button type="button" class="btn danger" data-delete-task="${prefill.id}">${icon('trash')}Delete</button>`:''}<button type="button" class="btn" data-close-modal>Cancel</button><button class="btn primary" type="submit">${icon('check')}Save task</button></div></form>`}
function courseModal(prefill={}){return `<div class="modal-head"><div><h2>${prefill.id?'Edit course':'Add course'}</h2><p>Create the recurring teaching structure first; details can evolve later.</p></div><button class="icon-btn" data-close-modal>${icon('x')}</button></div><form id="courseForm"><div class="modal-body"><input type="hidden" name="id" value="${prefill.id||''}"><div class="form-grid"><div class="form-field"><label>Course code</label><input name="code" required value="${esc(prefill.code||'')}" placeholder="PHY 221"></div><div class="form-field"><label>Course title</label><input name="title" required value="${esc(prefill.title||'')}" placeholder="Physics with Calculus I"></div><div class="form-field full"><label>Meeting days</label><div style="display:flex;gap:6px;flex-wrap:wrap">${['M','T','W','R','F'].map(d=>`<label class="filter-chip"><input type="checkbox" name="days" value="${d}" ${prefill.days?.includes(d)?'checked':''} style="width:auto;margin-right:4px">${d}</label>`).join('')}</div></div><div class="form-field"><label>Start time</label><input type="time" name="start" value="${prefill.start||'09:00'}"></div><div class="form-field"><label>End time</label><input type="time" name="end" value="${prefill.end||'10:15'}"></div><div class="form-field"><label>Room</label><input name="room" value="${esc(prefill.room||'')}" placeholder="BL 116"></div><div class="form-field"><label>Course color</label><input type="color" name="color" value="${prefill.color||'#6752c6'}" style="height:38px;padding:3px"></div></div></div><div class="modal-foot"><button type="button" class="btn" data-close-modal>Cancel</button><button class="btn primary" type="submit">${icon('check')}Save course</button></div></form>`}
function activityModal(){const cOpts=state.courses.filter(c=>c.type!=='block').map(c=>`<option value="${c.id}">${esc(c.code)}</option>`).join('');return `<div class="modal-head"><div><h2>Add teaching activity</h2><p>Add it to the semester; Acadence can generate preparation and grading work.</p></div><button class="icon-btn" data-close-modal>${icon('x')}</button></div><form id="activityForm"><div class="modal-body"><div class="form-grid"><div class="form-field"><label>Course</label><select name="courseId">${cOpts}</select></div><div class="form-field"><label>Type</label><select name="type">${['Lecture plan','Quiz','Homework','Lab','Exam','Project','Note'].map(x=>`<option>${x}</option>`).join('')}</select></div><div class="form-field full"><label>Title</label><input name="title" required placeholder="Quiz 2: One-dimensional motion"></div><div class="form-field"><label>Activity date</label><input name="date" type="date" value="${state.selectedDate}"></div><div class="form-field"><label>Generate faculty work</label><select name="generate"><option value="yes">Preparation task</option><option value="grading">Preparation + grading tasks</option><option value="no">No generated tasks</option></select></div></div></div><div class="modal-foot"><button type="button" class="btn" data-close-modal>Cancel</button><button class="btn primary" type="submit">${icon('check')}Save activity</button></div></form>`}
function blockModal(){return `<div class="modal-head"><div><h2>Add recurring block</h2><p>Use this for office hours, meetings, advising, research, or unavailable time.</p></div><button class="icon-btn" data-close-modal>${icon('x')}</button></div><form id="blockForm"><div class="modal-body"><div class="form-grid"><div class="form-field full"><label>Title</label><input name="title" required placeholder="Research meeting"></div><div class="form-field full"><label>Days</label><div style="display:flex;gap:6px;flex-wrap:wrap">${['M','T','W','R','F'].map(d=>`<label class="filter-chip"><input type="checkbox" name="days" value="${d}" style="width:auto;margin-right:4px">${d}</label>`).join('')}</div></div><div class="form-field"><label>Start time</label><input type="time" name="start" value="17:00"></div><div class="form-field"><label>End time</label><input type="time" name="end" value="18:00"></div><div class="form-field"><label>Location</label><input name="room" placeholder="BL 110 or Online"></div><div class="form-field"><label>Color</label><input type="color" name="color" value="#6d8f43" style="height:38px;padding:3px"></div></div></div><div class="modal-foot"><button type="button" class="btn" data-close-modal>Cancel</button><button class="btn primary" type="submit">${icon('check')}Save block</button></div></form>`}
function openModal(type,prefill={}){const modal=document.getElementById('modal');modal.innerHTML=type==='task'?taskModal(prefill):type==='course'?courseModal(prefill):type==='activity'?activityModal():blockModal();document.getElementById('modalBackdrop').classList.add('open');hydrateIcons(modal);document.getElementById('addMenu').classList.remove('open')}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('open')}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove('show'),2400)}
function autoSchedule(){const pending=state.tasks.filter(t=>!t.done&&!t.plannedDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));pending.forEach(t=>{let best=null,bestMin=Infinity;for(let i=0;i<14;i++){const d=addDays(state.selectedDate,i);if(d>t.dueDate)break;const day=parse(d).getDay();if(day===0||day===6)continue;const min=state.tasks.filter(x=>!x.done&&x.plannedDate===d).reduce((a,x)=>a+x.minutes,0);if(min<bestMin){best=d;bestMin=min}}t.plannedDate=best||t.dueDate});safeSet(STORAGE,JSON.stringify(state));renderAll();toast('Unscheduled work placed on the lightest available days.')}
function balanceWeek(){const tasks=state.tasks.filter(t=>!t.done&&sameWeek(t.plannedDate||t.dueDate));const start=parse(state.selectedDate);start.setDate(start.getDate()-start.getDay()+1);const days=Array.from({length:5},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return iso(d)});const loads=Object.fromEntries(days.map(d=>[d,0]));tasks.sort((a,b)=>b.minutes-a.minutes).forEach(t=>{const valid=days.filter(d=>d<=t.dueDate);const target=(valid.length?valid:days).sort((a,b)=>loads[a]-loads[b])[0];t.plannedDate=target;loads[target]+=t.minutes});safeSet(STORAGE,JSON.stringify(state));renderAll();toast('This week has been rebalanced by estimated workload.')}
function renderAll(){renderNav();renderToday();renderSemester();renderCourses();renderTasks();renderReflection();renderMore();hydrateIcons();document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id===`view-${state.currentView}`))}
function closeMobile(){document.getElementById('sidebar').classList.remove('mobile-open')}
document.addEventListener('click',e=>{
 const view=e.target.closest('[data-view]')?.dataset.view;if(view){setView(view);return}
 if(e.target.closest('[data-open-add]')){document.getElementById('addMenu').classList.toggle('open');return}
 const add=e.target.closest('[data-add]')?.dataset.add;if(add){openModal(add);return}
 const date=e.target.closest('[data-date]')?.dataset.date;if(date){renderDrawer(date);return}
 if(e.target.closest('[data-close-drawer]')||e.target.id==='drawerBackdrop'){closeDrawer();return}
 if(e.target.closest('[data-close-modal]')||e.target===document.getElementById('modalBackdrop')){closeModal();return}
 const filter=e.target.closest('[data-task-filter]')?.dataset.taskFilter;if(filter){state.taskFilter=filter;save();return}
 const month=e.target.closest('[data-month]')?.dataset.month;if(month){const [y,m]=state.month.split('-').map(Number);const d=new Date(y,m-1+Number(month),1);state.month=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;save();return}
 const calMode=e.target.closest('[data-calendar-mode]')?.dataset.calendarMode;if(calMode){document.querySelectorAll('[data-calendar-mode]').forEach(x=>x.classList.toggle('active',x.dataset.calendarMode===calMode));document.getElementById('calendarBody').innerHTML=calMode==='month'?renderMonth():renderWeek();hydrateIcons(document.getElementById('calendarBody'));return}
 const menuId=e.target.closest('[data-task-menu]')?.dataset.taskMenu;if(menuId){openModal('task',state.tasks.find(t=>t.id===menuId));return}
 const courseTask=e.target.closest('[data-add-task-course]')?.dataset.addTaskCourse;if(courseTask){openModal('task',{courseId:courseTask,plannedDate:state.selectedDate,dueDate:state.selectedDate});return}
 const courseMenu=e.target.closest('[data-course-menu]')?.dataset.courseMenu;if(courseMenu){openModal('course',course(courseMenu));return}
 const courseOpen=e.target.closest('[data-course-open]')?.dataset.courseOpen;if(courseOpen){state.search=course(courseOpen)?.code||'';state.taskFilter='all';setView('tasks');renderTasks();hydrateIcons(document.getElementById('view-tasks'));return}
 const panel=e.target.closest('[data-more-panel]')?.dataset.morePanel;if(panel){state.morePanel=panel;safeSet(STORAGE,JSON.stringify(state));renderMore();hydrateIcons(document.getElementById('view-more'));setTimeout(()=>document.getElementById('morePanel')?.scrollIntoView({behavior:'smooth',block:'start'}),20);return}
 const meeting=e.target.closest('[data-reflect-meeting]')?.dataset.reflectMeeting;if(meeting){const [cid,date]=meeting.split('|'),m={...course(cid),courseId:cid,date};document.querySelectorAll('.meeting-choice').forEach(x=>x.classList.toggle('active',x.dataset.reflectMeeting===meeting));document.getElementById('reflectionForm').innerHTML=reflectionForm(m);hydrateIcons(document.getElementById('reflectionForm'));return}
 const choice=e.target.closest('.choice-btn');if(choice){choice.parentElement.querySelectorAll('.choice-btn').forEach(x=>x.classList.remove('active'));choice.classList.add('active');return}
 if(e.target.closest('#scheduleUnscheduled')){autoSchedule();return}if(e.target.closest('#rebalanceTasks')){balanceWeek();return}
 if(e.target.closest('#goToday')){state.selectedDate=demoToday;state.month=demoToday.slice(0,7);save();return}
 if(e.target.closest('#copySemester')||e.target.closest('#reuseCourse')){toast('Prototype: course reuse would copy structure and shift dates into the selected semester.');return}
 if(e.target.closest('#exportJson')){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='acadence-prototype-data.json';a.click();URL.revokeObjectURL(a.href);toast('Prototype data downloaded.');return}
 if(e.target.closest('#exportIcs')){toast('Prototype: recurring courses and activities would export as an .ics calendar.');return}
 if(e.target.closest('#resetPrototype')){if(confirm('Reset all prototype changes?')){safeRemove(STORAGE);state=structuredClone(defaultState);renderAll();toast('Prototype reset.')}return}
 if(e.target.closest('#saveReflection')||e.target.closest('#saveReflectionTop')){saveReflection();return}
});
document.addEventListener('change',e=>{
 if(e.target.classList.contains('task-check')){const row=e.target.closest('[data-task-id]'),t=state.tasks.find(x=>x.id===row.dataset.taskId);if(t){t.done=e.target.checked;safeSet(STORAGE,JSON.stringify(state));renderAll();toast(t.done?'Task completed.':'Task reopened.')}return}
 if(e.target.matches('[data-check-kind]')){const list=state.checklists[e.target.dataset.checkKind],item=list.find(x=>x.id===e.target.dataset.checkId);if(item){item.done=e.target.checked;safeSet(STORAGE,JSON.stringify(state));renderMore();hydrateIcons(document.getElementById('view-more'))}return}
 if(e.target.id==='importJson'){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{state={...structuredClone(defaultState),...JSON.parse(r.result)};safeSet(STORAGE,JSON.stringify(state));renderAll();toast('Prototype data imported.')}catch(err){alert('This file is not valid Acadence prototype data.')}};r.readAsText(file)}
});
document.addEventListener('submit',e=>{
 e.preventDefault();const fd=new FormData(e.target);const formId=e.target.getAttribute('id');
 if(formId==='taskForm'){const id=fd.get('id')||uid('task'),existing=state.tasks.find(t=>t.id===id),obj={id,title:fd.get('title').trim(),courseId:fd.get('courseId'),category:fd.get('category'),plannedDate:fd.get('plannedDate'),dueDate:fd.get('dueDate'),minutes:Number(fd.get('minutes')),priority:fd.get('priority'),done:existing?.done||false,source:existing?.source||'manual'};if(existing)Object.assign(existing,obj);else state.tasks.push(obj);safeSet(STORAGE,JSON.stringify(state));closeModal();renderAll();toast(existing?'Task updated.':'Task added.');return}
 if(formId==='courseForm'){const id=fd.get('id')||uid('course'),existing=course(id),days=fd.getAll('days'),obj={id,code:fd.get('code').trim(),title:fd.get('title').trim(),days,start:fd.get('start'),end:fd.get('end'),room:fd.get('room').trim(),color:fd.get('color'),meetingsDone:existing?.meetingsDone||0,meetingsTotal:existing?.meetingsTotal||30};if(existing)Object.assign(existing,obj);else state.courses.push(obj);safeSet(STORAGE,JSON.stringify(state));closeModal();renderAll();toast(existing?'Course updated.':'Course added.');return}
 if(formId==='activityForm'){const a={id:uid('activity'),date:fd.get('date'),courseId:fd.get('courseId'),type:fd.get('type'),title:fd.get('title').trim()};state.activities.push(a);if(fd.get('generate')!=='no'){state.tasks.push({id:uid('task'),title:`Prepare ${a.title}`,courseId:a.courseId,plannedDate:addDays(a.date,-2),dueDate:a.date,minutes:a.type==='Exam'?90:45,priority:'medium',done:false,source:'auto',category:'Preparation'});if(fd.get('generate')==='grading')state.tasks.push({id:uid('task'),title:`Grade ${a.title}`,courseId:a.courseId,plannedDate:addDays(a.date,1),dueDate:addDays(a.date,4),minutes:a.type==='Exam'?120:60,priority:'medium',done:false,source:'auto',category:'Grading'})}safeSet(STORAGE,JSON.stringify(state));closeModal();renderAll();toast('Teaching activity added with faculty work.');return}
 if(formId==='blockForm'){state.courses.push({id:uid('block'),code:fd.get('title').trim(),title:'Recurring commitment',days:fd.getAll('days'),start:fd.get('start'),end:fd.get('end'),room:fd.get('room').trim(),color:fd.get('color'),meetingsDone:0,meetingsTotal:30,type:'block'});safeSet(STORAGE,JSON.stringify(state));closeModal();renderAll();toast('Recurring block added.');return}
});
document.addEventListener('click',e=>{const del=e.target.closest('[data-delete-task]')?.dataset.deleteTask;if(del){state.tasks=state.tasks.filter(t=>t.id!==del);safeSet(STORAGE,JSON.stringify(state));closeModal();renderAll();toast('Task deleted.')}})
function saveReflection(){const cid=document.getElementById('reflectCourse')?.value,date=document.getElementById('reflectDate')?.value;if(!cid)return;const getChoice=k=>document.querySelector(`[data-choice="${k}"] .active`)?.textContent.trim()||'';const note=document.getElementById('reflectNote')?.value.trim()||'',carry=document.getElementById('reflectCarry')?.value.trim()||'';state.reflections.push({id:uid('reflection'),date,courseId:cid,engagement:getChoice('engagement'),pacing:getChoice('pacing'),clarity:getChoice('clarity'),note:note||'Reflection recorded.',carry});if(carry)state.tasks.push({id:uid('task'),title:carry,courseId:cid,plannedDate:addDays(date,2),dueDate:addDays(date,2),minutes:20,priority:'medium',done:false,source:'auto',category:'Preparation'});safeSet(STORAGE,JSON.stringify(state));renderAll();toast(carry?'Reflection saved and carry-forward task created.':'Reflection saved.')}
document.getElementById('addButton').addEventListener('click',()=>document.getElementById('addMenu').classList.toggle('open'));
document.getElementById('mobileMenu').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('mobile-open'));
document.getElementById('globalSearch').addEventListener('input',e=>{state.search=e.target.value;state.taskFilter='all';if(e.target.value.trim()){setView('tasks');renderTasks();hydrateIcons(document.getElementById('view-tasks'))}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();closeModal();document.getElementById('addMenu').classList.remove('open')}if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();document.getElementById('globalSearch').focus()}});
renderAll();hydrateIcons();
</script>
</body>
</html>
