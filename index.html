  function exportIcsWorkflow(){const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Acadence//Faculty Planner//EN','CALSCALE:GREGORIAN'],stamp=new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}Z$/,'Z'),dt=(d,t)=>`${d.replaceAll('-','')}T${String(t||'09:00').replace(':','')}00`,clean=x=>String(x||'').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');for(const c of teachingCourses())for(const r of classMeetingDetails(c).filter(x=>x.status==='counted'))lines.push('BEGIN:VEVENT',`UID:${c.id}-${r.date}@acadence`,`DTSTAMP:${stamp}`,`DTSTART:${dt(r.date,c.start)}`,`DTEND:${dt(r.date,c.end)}`,`SUMMARY:${clean(c.code+' '+c.title)}`,`LOCATION:${clean(courseLocation(c))}`,`DESCRIPTION:${r.online?'Online class meeting':r.makeup?'Makeup class meeting':'Class meeting'}`,'END:VEVENT');for(const a of state.activities)lines.push('BEGIN:VEVENT',`UID:${a.id}@acadence`,`DTSTAMP:${stamp}`,`DTSTART;VALUE=DATE:${a.date.replaceAll('-','')}`,`DTEND;VALUE=DATE:${addDays(a.date,1).replaceAll('-','')}`,`SUMMARY:${clean((course(a.courseId)?.code||'')+' '+a.title)}`,`DESCRIPTION:${clean(a.type+(a.notes?' - '+a.notes:''))}`,'END:VEVENT');for(const c of teachingCourses())if(c.finalDate)lines.push('BEGIN:VEVENT',`UID:${c.id}-final@acadence`,`DTSTAMP:${stamp}`,c.finalStart?`DTSTART:${dt(c.finalDate,c.finalStart)}`:`DTSTART;VALUE=DATE:${c.finalDate.replaceAll('-','')}`,c.finalEnd?`DTEND:${dt(c.finalDate,c.finalEnd)}`:`DTEND;VALUE=DATE:${addDays(c.finalDate,1).replaceAll('-','')}`,`SUMMARY:${clean(c.code+' Final Examination')}`,`LOCATION:${clean(c.finalRoom||courseLocation(c))}`,'END:VEVENT');lines.push('END:VCALENDAR');const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`acadence-${state.selectedSemester}.ics`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

    const finalIndex=e.target.closest('[data-final-slot-index]')?.dataset.finalSlotIndex;if(finalIndex!==undefined){e.preventDefault();e.stopImmediatePropagation();const rule=finalRulesForCurrentSemester()[Number(finalIndex)];if(rule){setFinalSelection(rule.date,finalRuleStart(rule),finalRuleEnd(rule));closeFinalSchedulePicker()}return}
    if(e.target.closest('#applyCustomFinalSlot')){e.preventDefault();e.stopImmediatePropagation();const date=document.getElementById('customFinalDate')?.value||'',start=document.getElementById('customFinalStart')?.value||'',end=document.getElementById('customFinalEnd')?.value||'';if(!date){alert('Choose a final-examination date.');return}if(start&&end&&timeMinutes(end)<=timeMinutes(start)){alert('The final-examination end time must be after the start time.');return}setFinalSelection(date,start,end);closeFinalSchedulePicker();return}
    if(e.target.closest('[data-clear-final-selection]')){e.preventDefault();e.stopImmediatePropagation();setFinalSelection('','','');e.target.closest('.final-exam-selection-actions')?.remove();return}
    if(e.target.closest('[data-close-final-picker]')||e.target.id==='finalScheduleOverlay'){e.preventDefault();e.stopImmediatePropagation();closeFinalSchedulePicker();return}
    const mode=e.target.closest('[data-calendar-mode]')?.dataset.calendarMode;if(mode){e.preventDefault();e.stopImmediatePropagation();state.plannerMode=mode;persistState({render:false});renderSemester();hydrateIcons(document.getElementById('view-semester'));return}
    const shift=e.target.closest('[data-planner-shift]')?.dataset.plannerShift;if(shift){e.preventDefault();e.stopImmediatePropagation();const n=Number(shift);if(state.plannerMode==='month'){const [y,m]=state.month.split('-').map(Number),d=new Date(y,m-1+n,1);state.month=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}else if(state.plannerMode!=='semester')state.selectedDate=addDays(state.selectedDate,state.plannerMode==='week'?n*7:n);persistState({render:false});renderSemester();hydrateIcons(document.getElementById('view-semester'));return}
    const editCourse=e.target.closest('[data-edit-course-workflow]')?.dataset.editCourseWorkflow;if(editCourse){e.preventDefault();e.stopImmediatePropagation();openModal('course',course(editCourse));return}
    const editBlock=e.target.closest('[data-edit-block]')?.dataset.editBlock;if(editBlock){e.preventDefault();e.stopImmediatePropagation();openModal('block',course(editBlock));return}
    const editAbs=e.target.closest('[data-edit-absence]')?.dataset.editAbsence;if(editAbs){e.preventDefault();e.stopImmediatePropagation();openModal('absence',state.plannedAbsences.find(a=>a.id===editAbs));return}
    const editAct=e.target.closest('[data-edit-activity]')?.dataset.editActivity;if(editAct){e.preventDefault();e.stopImmediatePropagation();openModal('activity',state.activities.find(a=>a.id===editAct));return}
    const addActDate=e.target.closest('[data-add-activity-date]')?.dataset.addActivityDate;if(addActDate){e.preventDefault();e.stopImmediatePropagation();openModal('activity',{date:addActDate,courseId:state.courseFilter});return}
    const addTaskDate=e.target.closest('[data-add-task-date]')?.dataset.addTaskDate;if(addTaskDate){e.preventDefault();e.stopImmediatePropagation();openModal('task',{plannedDate:addTaskDate,dueDate:addTaskDate,courseId:state.courseFilter});return}
    const openDate=e.target.closest('[data-open-date-workflow]')?.dataset.openDateWorkflow;if(openDate){e.preventDefault();e.stopImmediatePropagation();renderDrawer(openDate);return}
    const planCourse=e.target.closest('[data-plan-course]')?.dataset.planCourse;if(planCourse){e.preventDefault();e.stopImmediatePropagation();state.courseFilter=planCourse;state.plannerMode='month';state.currentView='semester';persistState({render:false});renderAll();return}
    const finish=e.target.closest('#finishSemesterSetup');if(finish){e.preventDefault();e.stopImmediatePropagation();if(!teachingCourses().length)return;const progress=setupProgress();if(progress.done<5&&!confirm('Some optional setup areas are not marked reviewed. Continue to course planning?'))return;state.setupCompleted[state.selectedSemester]=true;state.currentView='semester';state.plannerMode='month';persistState({render:false});renderAll();toast('Semester setup complete. Start planning your courses.');return}
    const delCourse=e.target.closest('[data-delete-course]')?.dataset.deleteCourse;if(delCourse){e.preventDefault();e.stopImmediatePropagation();const c=course(delCourse);if(c&&confirm(`Delete ${c.code}? Its activities, tasks, reflections, cancellations, and notes will also be removed.`)){state.courses=state.courses.filter(x=>x.id!==delCourse);state.activities=state.activities.filter(x=>x.courseId!==delCourse);state.tasks=state.tasks.filter(x=>x.courseId!==delCourse);state.reflections=state.reflections.filter(x=>x.courseId!==delCourse);for(const k of Object.keys(state.cancelledMeetings))if(k.startsWith(delCourse+'|'))delete state.cancelledMeetings[k];for(const k of Object.keys(state.meetingNotes))if(k.startsWith(delCourse+'|'))delete state.meetingNotes[k];state.dayCountCourseId=teachingCourses()[0]?.id||'';closeModal();persistState({render:false});renderAll();toast('Course deleted.')}return}
    const delBlock=e.target.closest('[data-delete-block]')?.dataset.deleteBlock;if(delBlock){e.preventDefault();e.stopImmediatePropagation();if(confirm('Delete this recurring block?')){state.courses=state.courses.filter(x=>x.id!==delBlock);closeModal();persistState({render:false});renderAll()}return}
    const delAbs=e.target.closest('[data-delete-absence]')?.dataset.deleteAbsence;if(delAbs){e.preventDefault();e.stopImmediatePropagation();if(confirm('Delete this planned absence?')){state.plannedAbsences=state.plannedAbsences.filter(a=>a.id!==delAbs);closeModal();persistState({render:false});renderAll()}return}
    const delAct=e.target.closest('[data-delete-activity]')?.dataset.deleteActivity;if(delAct){e.preventDefault();e.stopImmediatePropagation();state.activities=state.activities.filter(a=>a.id!==delAct);closeModal();persistState({render:false});renderAll();toast('Activity deleted.');return}
    const toggle=e.target.closest('[data-toggle-class]')?.dataset.toggleClass;if(toggle){e.preventDefault();e.stopImmediatePropagation();const [cid,date]=toggle.split('|'),key=cancellationKey(cid,date);if(state.cancelledMeetings[key])delete state.cancelledMeetings[key];else state.cancelledMeetings[key]='Cancelled by instructor';persistState({render:false});renderAll();renderDrawer(date);return}
    const addMakeup=e.target.closest('[data-add-makeup]')?.dataset.addMakeup;if(addMakeup){e.preventDefault();e.stopImmediatePropagation();openModal('makeup',{courseId:addMakeup});return}
    const layout=e.target.closest('[data-daycount-layout]')?.dataset.daycountLayout;if(layout){e.preventDefault();e.stopImmediatePropagation();state.dayCountLayout=layout;persistState({render:false});renderDayCount();hydrateIcons(document.getElementById('view-daycount'));return}
    if(e.target.closest('#workflowPrintPlanner')){e.preventDefault();e.stopImmediatePropagation();openPrint('Acadence Planner',plannerBody(),['week','month','semester'].includes(state.plannerMode));return}
    if(e.target.closest('#workflowPrintDayCount')||e.target.closest('#printDayCount')){e.preventDefault();e.stopImmediatePropagation();const c=course(state.dayCountCourseId);if(c)openPrint(`${c.code} Day-count Table`,document.querySelector('.daycount-table-wrap')?.outerHTML||renderDayCount(),true);return}
    if(e.target.closest('#workflowDayCountCsv')||e.target.closest('#exportDayCountCsv')){e.preventDefault();e.stopImmediatePropagation();dayCountCsv();return}
    if(e.target.closest('#workflowExportIcs')){e.preventDefault();e.stopImmediatePropagation();exportIcsWorkflow();return}
    if(e.target.closest('#workflowExportJson')){e.preventDefault();e.stopImmediatePropagation();const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`acadence-${state.selectedSemester}-plan.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);return}
  },true);
  document.addEventListener('change',function(e){
    if(e.target.id==='semesterSelect'){e.preventDefault();e.stopImmediatePropagation();state.selectedSemester=e.target.value;state=normalizeState(state);state.selectedDate=semester().start;state.month=semester().start.slice(0,7);state.currentView=setupIsComplete()?'today':'setup';persistState({render:false});renderAll();toast(`${selectedSemesterLabel()} loaded.`);return}
    if(e.target.id==='plannerCourseFilter'){e.preventDefault();e.stopImmediatePropagation();state.courseFilter=e.target.value;persistState({render:false});renderSemester();hydrateIcons(document.getElementById('view-semester'));return}
    if(e.target.matches('[data-setup-review]')){e.preventDefault();e.stopImmediatePropagation();setupReview()[e.target.dataset.setupReview]=e.target.checked;persistState({render:false});renderSetup();hydrateIcons(document.getElementById('view-setup'));return}
    if(e.target.matches('[data-meeting-note]')){e.preventDefault();e.stopImmediatePropagation();const [cid,date]=e.target.dataset.meetingNote.split('|'),value=e.target.value.trim(),key=cancellationKey(cid,date);if(value)state.meetingNotes[key]=value;else delete state.meetingNotes[key];persistState({render:false});return}
  },true);
  document.addEventListener('submit',function(e){
    const id=e.target.getAttribute('id');if(!['courseForm','blockForm','activityForm','absenceForm','makeupForm'].includes(id))return;e.preventDefault();e.stopImmediatePropagation();const fd=new FormData(e.target);
    if(id==='courseForm'){const cid=fd.get('id')||uid('course'),existing=course(cid),days=fd.getAll('days');if(!days.length){alert('Choose at least one meeting day.');return}const obj={id:cid,code:fd.get('code').trim(),title:fd.get('title').trim(),credits:fd.get('credits').trim(),days,start:fd.get('start'),end:fd.get('end'),building:fd.get('building').trim(),room:fd.get('room').trim(),color:fd.get('color'),finalDate:fd.get('finalDate'),finalStart:fd.get('finalStart'),finalEnd:fd.get('finalEnd'),finalRoom:fd.get('finalRoom').trim(),makeupDates:existing?.makeupDates||[]};if(existing)Object.assign(existing,obj);else state.courses.push(obj);state.dayCountCourseId=state.dayCountCourseId||cid;closeModal();persistState({render:false});renderAll();toast(existing?'Course updated.':'Course added.');return}
    if(id==='blockForm'){const bid=fd.get('id')||uid('block'),existing=course(bid),obj={id:bid,code:fd.get('title').trim(),title:'Recurring commitment',days:fd.getAll('days'),start:fd.get('start'),end:fd.get('end'),room:fd.get('room').trim(),building:'',color:fd.get('color'),type:'block'};if(existing)Object.assign(existing,obj);else state.courses.push(obj);closeModal();persistState({render:false});renderAll();toast(existing?'Recurring block updated.':'Recurring block added.');return}
    if(id==='activityForm'){const aid=fd.get('id')||uid('activity'),existing=state.activities.find(a=>a.id===aid),obj={id:aid,date:fd.get('date'),courseId:fd.get('courseId'),type:fd.get('type'),title:fd.get('title').trim(),gradeDate:fd.get('gradeDate'),notes:fd.get('notes').trim()};if(existing)Object.assign(existing,obj);else state.activities.push(obj);if(!existing&&fd.get('generate')!=='no'){state.tasks.push({id:uid('task'),title:`Prepare ${obj.title}`,courseId:obj.courseId,plannedDate:addDays(obj.date,-2),dueDate:obj.date,minutes:obj.type==='Exam'?90:45,priority:'medium',done:false,source:'auto',category:'Preparation'});if(fd.get('generate')==='grading'){const gradeDate=obj.gradeDate||addDays(obj.date,1);state.tasks.push({id:uid('task'),title:`Grade ${obj.title}`,courseId:obj.courseId,plannedDate:gradeDate,dueDate:obj.gradeDate||addDays(obj.date,4),minutes:obj.type==='Exam'?120:60,priority:'medium',done:false,source:'auto',category:'Grading'})}}closeModal();persistState({render:false});renderAll();toast(existing?'Activity updated.':'Activity added.');return}
    if(id==='absenceForm'){const aid=fd.get('id')||uid('absence'),existing=state.plannedAbsences.find(a=>a.id===aid),startDate=fd.get('startDate'),endDate=fd.get('endDate');if(endDate<startDate){alert('The end date cannot be before the start date.');return}const obj={id:aid,startDate,endDate,reason:fd.get('reason').trim()};if(existing)Object.assign(existing,obj);else state.plannedAbsences.push(obj);state.plannedAbsences.sort((a,b)=>a.startDate.localeCompare(b.startDate));setupReview().absences=true;closeModal();persistState({render:false});renderAll();toast(existing?'Absence updated.':'Planned absence added.');return}
    if(id==='makeupForm'){const c=course(fd.get('courseId')),date=fd.get('date');c.makeupDates=[...new Set([...(c.makeupDates||[]),date])].sort();closeModal();persistState({render:false});renderAll();toast('Makeup meeting added.');return}
  },true);

  // Update reflections rather than creating duplicates, and carry forward to the next actual class meeting.
  saveReflection=function(){const cid=document.getElementById('reflectCourse')?.value,date=document.getElementById('reflectDate')?.value;if(!cid)return;const getChoice=k=>document.querySelector(`[data-choice="${k}"] .active`)?.textContent.trim()||'',note=document.getElementById('reflectNote')?.value.trim()||'',carry=document.getElementById('reflectCarry')?.value.trim()||'',existing=state.reflections.find(r=>r.courseId===cid&&r.date===date),obj={id:existing?.id||uid('reflection'),date,courseId:cid,engagement:getChoice('engagement'),pacing:getChoice('pacing'),clarity:getChoice('clarity'),note:note||'Reflection recorded.',carry};if(existing)Object.assign(existing,obj);else state.reflections.push(obj);if(carry&&!state.tasks.some(t=>t.sourceReflectionId===obj.id)){const next=classMeetingDates(course(cid)).find(d=>d>date)||date;state.tasks.push({id:uid('task'),title:carry,courseId:cid,plannedDate:next,dueDate:next,minutes:20,priority:'medium',done:false,source:'auto',category:'Preparation',sourceReflectionId:obj.id})}persistState({render:false});renderAll();toast(carry?'Reflection saved and carried to the next meeting.':'Reflection saved.')};

  // Show setup for a brand-new plan.
  if(!setupIsComplete()&&!teachingCourses().length){state.currentView='setup';state.selectedDate=semester().start;state.month=semester().start.slice(0,7)}
  renderAll();
})();
</script>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged,setPersistence,inMemoryPersistence} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {getFirestore,doc,getDoc,setDoc,collection,getDocs,writeBatch,serverTimestamp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import {getStorage,ref as storageRef,uploadString,getBytes} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

const firebaseConfig={
 apiKey:"AIzaSyDLvnRnTfaDTN_AJW2AvD_Ao0bQvRz7yM0",
 authDomain:"shc-apps.firebaseapp.com",
 projectId:"shc-apps",
 storageBucket:"shc-apps.firebasestorage.app",
 messagingSenderId:"974556600911",
 appId:"1:974556600911:web:1b8827f884b752c764283a",
 measurementId:"G-PF0CDZQKNB"
};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app),storage=getStorage(app),provider=new GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});
const ADMIN_EMAIL='padhya@shc.edu';
let user=null,cloudReady=false,pending=null,saveTimer=null;

const bridge=()=>window.acadenceBridge;
function profile(u){return {name:u?.displayName||u?.email?.split('@')[0]||'Acadence user',email:u?.email||'',photoURL:u?.photoURL||''}}
function planRef(){return user?doc(db,'users',user.uid,'apps','acadence-redesign'):null}
function backupRef(){return user?storageRef(storage,`acadenceBackups/${user.uid}/planner.json`):null}
function isAdminUser(u=user){return Boolean(u?.emailVerified&&String(u?.email||'').toLowerCase()===ADMIN_EMAIL)}
function calendarCollection(){return collection(db,'acadenceAcademicCalendars')}
async function loadAcademicCalendars(){if(!user)return;const snap=await getDocs(calendarCollection()),calendars={};snap.forEach(calendarSnap=>{const data=calendarSnap.data()||{};calendars[calendarSnap.id]={label:data.label||calendarSnap.id,start:data.start,lastClass:data.lastClass,finalsStart:data.finalsStart,finalsEnd:data.finalsEnd,finalGradesDue:data.finalGradesDue,noClass:data.noClass||{},onlineDays:data.onlineDays||{},partialNoClass:data.partialNoClass||{},important:Array.isArray(data.important)?data.important:[],finalExamRules:Array.isArray(data.finalExamRules)?data.finalExamRules:[]}});bridge().applySharedCalendars(calendars);return calendars}
async function uploadAcademicCalendars(calendars){if(!isAdminUser())throw new Error('Only padhya@shc.edu can publish academic calendars.');const entries=Object.entries(calendars||{});if(!entries.length)throw new Error('No calendars were found in the upload.');const batch=writeBatch(db),now=Date.now();for(const [id,calendar] of entries){batch.set(doc(db,'acadenceAcademicCalendars',id),{...calendar,calendarId:id,schemaVersion:3,updatedAt:serverTimestamp(),updatedAtMs:now,updatedBy:user.email},{merge:false})}await batch.commit();await loadAcademicCalendars();return entries.length}
function status(state,message,time=null){bridge()?.setSyncStatus?.({state,message,time})}
async function writeStorageCopy(next,now){const ref=backupRef();if(!ref)return false;await uploadString(ref,JSON.stringify({state:next,profile:profile(user),schemaVersion:3,updatedAtMs:now}),'raw',{contentType:'application/json'});return true}
async function writeCloud(next){const ref=planRef();if(!ref||!cloudReady)return;const now=Date.now();status('syncing','Saving…');let firestoreSaved=false,storageSaved=false;try{await setDoc(ref,{state:next,profile:profile(user),schemaVersion:3,updatedAt:serverTimestamp(),updatedAtMs:now},{merge:true});firestoreSaved=true}catch(error){console.warn('Firestore save failed; trying the secondary cloud copy.',error)}try{storageSaved=await writeStorageCopy(next,now)}catch(error){console.warn('Cloud Storage backup failed.',error)}if(!firestoreSaved&&!storageSaved)throw new Error('Neither cloud destination accepted the save.');status('synced','Saved',now)}
function queueSave(next){pending=next;if(!user||!cloudReady){status('error',user?'Waiting for cloud…':'Sign in required');return}clearTimeout(saveTimer);status('syncing','Saving…');saveTimer=setTimeout(async()=>{const copy=pending;pending=null;try{await writeCloud(copy)}catch(error){console.error('Acadence cloud save failed',error);pending=copy;status('error','Unable to save')}} ,700)}
async function readFirestoreCopy(){const ref=planRef();if(!ref)return null;const snap=await getDoc(ref);if(!snap.exists()||!snap.data()?.state)return null;const data=snap.data();return {state:data.state,updatedAtMs:Number(data.updatedAtMs||data.updatedAt?.toMillis?.()||0),source:'firestore'}}
async function readStorageCopy(){const ref=backupRef();if(!ref)return null;const bytes=await getBytes(ref,2*1024*1024);const data=JSON.parse(new TextDecoder().decode(bytes));if(!data?.state)return null;return {state:data.state,updatedAtMs:Number(data.updatedAtMs||0),source:'storage'}}
async function loadCloud(){if(!planRef())return;status('syncing','Loading cloud plan…');const results=await Promise.allSettled([readFirestoreCopy(),readStorageCopy()]);const copies=results.filter(result=>result.status==='fulfilled'&&result.value?.state).map(result=>result.value).sort((a,b)=>b.updatedAtMs-a.updatedAtMs);cloudReady=true;if(copies.length){const newest=copies[0];bridge().applyCloudState(newest.state,newest.updatedAtMs||Date.now());status('synced','Loaded',newest.updatedAtMs||Date.now());if(newest.source==='storage'){writeCloud(newest.state).catch(error=>console.warn('Could not refresh Firestore from the backup copy.',error))}}else{await writeCloud(bridge().getState());status('synced','Plan created',Date.now())}}
async function signInUser(){if(location.protocol==='file:'){bridge().showLogin('Google sign-in requires Acadence to be published on an authorized HTTPS domain.',true);return}try{bridge().showLogin('Opening Google sign-in…');await signInWithPopup(auth,provider)}catch(error){console.error('Google sign-in failed',error);const cancelled=['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(error?.code);bridge().showLogin(cancelled?'Sign-in was cancelled.':'Google sign-in could not be completed. Check the Firebase authorized domains and try again.',!cancelled)}}
async function signOutUser(){try{clearTimeout(saveTimer);if(pending&&user&&cloudReady)await writeCloud(pending);pending=null;await signOut(auth)}catch(error){console.error('Sign-out failed',error);status('error','Sign-out failed')}}
window.acadenceCloud={queueSave,signIn:signInUser,signOut:signOutUser,uploadAcademicCalendars,refreshAcademicCalendars:loadAcademicCalendars};
try{await setPersistence(auth,inMemoryPersistence)}catch(error){console.warn('Firebase persistence unavailable',error)}
onAuthStateChanged(auth,async nextUser=>{user=nextUser;cloudReady=false;if(!user){window.acadenceUserId='';bridge().showLogin('Sign in to load your private cloud plan.');status('error','Sign in required');return}if(!user.emailVerified){await signOut(auth);bridge().showLogin('Please use a verified Google account.',true);return}bridge().switchLocalUser(user.uid);bridge().applyUserProfile(profile(user));bridge().applyAdminAccess({isAdmin:isAdminUser(user),email:user.email});bridge().enterApp();try{await loadAcademicCalendars()}catch(error){console.error('Academic calendar load failed',error);bridge().applySharedCalendars({})}try{await loadCloud()}catch(error){console.error('Cloud load failed',error);cloudReady=false;status('error','Unable to connect — changes are not saved')}});
window.addEventListener('online',()=>{if(user){status('syncing','Back online…');if(pending)queueSave(pending);else loadCloud().catch(()=>status('error','Unable to connect — changes are not saved'))}});
window.addEventListener('offline',()=>status('error','Offline — changes are not saved yet'));
</script>
</body>
