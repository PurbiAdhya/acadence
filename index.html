    printWindow(
      "Faculty Task List",
      `<div>${state.tasks
        .filter(taskMatchesFilter)
        .map(taskRow)
        .join("")}</div>`
    );
    return;
  }

  if (
    event.target.closest("#printDayCountButton") ||
    event.target.closest("#printDayCount")
  ) {
    const course = findCourse(state.dayCountCourseId);

    if (course) {
      printWindow(
        `${course.code} Day-Count Table`,
        buildDayCountTable(course).html,
        true
      );
    }

    return;
  }

  if (event.target.closest("#exportDayCountCsvButton")) {
    exportDayCountCsv();
    return;
  }

  if (event.target.closest("#exportIcs")) {
    exportCalendarIcs();
    return;
  }

  if (event.target.closest("#exportJson")) {
    downloadFile(
      `acadence-plan-${state.selectedSemester}.json`,
      JSON.stringify(state, null, 2),
      "application/json"
    );
    return;
  }

  const checklistKind =
    event.target.closest("[data-print-checklist]")
      ?.dataset.printChecklist;

  if (checklistKind) {
    printChecklist(checklistKind);
    return;
  }

  if (event.target.closest("#downloadCalendarTemplateButton")) {
    downloadFile(
      "acadence-academic-calendar-template.json",
      JSON.stringify(academicCalendarTemplate(), null, 2),
      "application/json"
    );
    return;
  }

  if (
    event.target.closest("#resetPlanButton") &&
    confirm(
      "Reset the complete cloud plan? This cannot be undone unless you exported a backup."
    )
  ) {
    state = structuredClone(DEFAULT_STATE);
    saveState();
  }
});

document.addEventListener("change", event => {
  if (event.target.id === "semesterSelect") {
    state.selectedSemester = event.target.value;
    state.selectedDate = currentSemester().start;
    state.selectedMonth = currentSemester().start.slice(0, 7);
    state.dayCountCourseId = state.courses[0]?.id || "";
    saveState();
    return;
  }

  if (event.target.id === "plannerCourseFilter") {
    state.courseFilter = event.target.value;
    saveState();
    return;
  }

  if (event.target.id === "dayCountCourseSelect") {
    state.dayCountCourseId = event.target.value;
    saveState();
    return;
  }

  if (event.target.classList.contains("task-checkbox")) {
    const taskId =
      event.target.closest("[data-task-id]")
        ?.dataset.taskId;

    const task = state.tasks.find(item => item.id === taskId);

    if (task) {
      task.done = event.target.checked;
      saveState();

      showToast(
        task.done
          ? "Task completed."
          : "Task reopened."
      );
    }

    return;
  }

  if (event.target.matches("[data-checklist-kind]")) {
    const list = state.checklists[
      event.target.dataset.checklistKind
    ];

    const item = list.find(
      checklistItem =>
        checklistItem.id === event.target.dataset.checklistId
    );

    if (item) {
      item.done = event.target.checked;
      saveState();
    }

    return;
  }

  if (event.target.matches("[data-meeting-note]")) {
    const [courseId, date] =
      event.target.dataset.meetingNote.split("|");

    const key = cancellationKey(courseId, date);
    const note = event.target.value.trim();

    if (note) {
      state.meetingNotes[key] = note;
    } else {
      delete state.meetingNotes[key];
    }

    saveState(false);
    return;
  }

  if (event.target.id === "weekStartSetting") {
    state.weekStartsOn = event.target.value;
    saveState();
    return;
  }

  if (event.target.id === "workloadLimitSetting") {
    state.settings.dailyWorkloadMinutes =
      Number(event.target.value);

    saveState();
    return;
  }

  if (event.target.id === "preventConflictSetting") {
    state.settings.preventActivityConflicts =
      event.target.checked;

    saveState();
    return;
  }

  if (event.target.id === "importJsonInput") {
    const file = event.target.files?.[0];

    if (!file) return;

    file.text().then(contents => {
      try {
        state = normalizeState(JSON.parse(contents));
        saveState();
        showToast("Plan imported.");
      } catch (error) {
        alert("This is not a valid Acadence plan file.");
      }
    });

    return;
  }

  if (event.target.id === "adminCalendarFileInput") {
    const file = event.target.files?.[0];

    if (!file) return;

    const status = $("#adminCalendarStatus");
    status.textContent = "Validating and publishing…";

    file.text()
      .then(contents =>
        normalizeUploadedCalendars(JSON.parse(contents))
      )
      .then(uploadAcademicCalendars)
      .then(count => {
        status.textContent =
          `Published ${count} calendar${count === 1 ? "" : "s"}.`;

        showToast("Academic calendar published.");
      })
      .catch(error => {
        console.error(error);
        status.textContent =
          error.message || "The calendar could not be uploaded.";
      });

    event.target.value = "";
  }
});

document.addEventListener("submit", event => {
  event.preventDefault();

  const form = event.target;
  const data = new FormData(form);

  if (form.id === "courseForm") {
    const days = data.getAll("days");

    if (!days.length) {
      alert("Choose at least one meeting day.");
      return;
    }

    const courseId = data.get("id") || uniqueId("course");
    const existing = findCourse(courseId);

    const course = {
      id:courseId,
      code:data.get("code").trim(),
      title:data.get("title").trim(),
      credits:data.get("credits").trim(),
      instructor:data.get("instructor").trim(),
      days,
      start:data.get("start"),
      end:data.get("end"),
      building:data.get("building").trim(),
      room:data.get("room").trim(),
      color:data.get("color"),
      finalDate:data.get("finalDate"),
      finalStart:data.get("finalStart"),
      finalEnd:data.get("finalEnd"),
      finalRoom:data.get("finalRoom").trim(),
      makeupDates:existing?.makeupDates || []
    };

    if (existing) {
      Object.assign(existing, course);
    } else {
      state.courses.push(course);
    }

    if (!state.dayCountCourseId) {
      state.dayCountCourseId = courseId;
    }

    closeModal();
    saveState();

    showToast(
      existing
        ? "Course updated."
        : "Course added."
    );

    return;
  }

  if (form.id === "blockForm") {
    const blockId = data.get("id") || uniqueId("block");
    const existing = findBlock(blockId);

    const block = {
      id:blockId,
      code:data.get("title").trim(),
      title:"Recurring commitment",
      days:data.getAll("days"),
      start:data.get("start"),
      end:data.get("end"),
      building:data.get("building").trim(),
      room:data.get("room").trim(),
      color:data.get("color"),
      type:"block"
    };

    if (existing) {
      Object.assign(existing, block);
    } else {
      state.blocks.push(block);
    }

    closeModal();
    saveState();
    return;
  }

  if (form.id === "taskForm") {
    const taskId = data.get("id") || uniqueId("task");

    const existing = state.tasks.find(
      task => task.id === taskId
    );

    const task = {
      id:taskId,
      title:data.get("title").trim(),
      courseId:data.get("courseId"),
      category:data.get("category"),
      plannedDate:data.get("plannedDate"),
      dueDate:data.get("dueDate"),
      minutes:Number(data.get("minutes")),
      priority:data.get("priority"),
      done:existing?.done || false,
      source:existing?.source || "manual"
    };

    if (existing) {
      Object.assign(existing, task);
    } else {
      state.tasks.push(task);
    }

    closeModal();
    saveState();
    return;
  }

  if (form.id === "activityForm") {
    const activityId = data.get("id");

    const existing = state.activities.find(
      activity => activity.id === activityId
    );

    const baseActivity = {
      id:activityId || uniqueId("activity"),
      courseId:data.get("courseId"),
      type:data.get("type"),
      title:data.get("title").trim(),
      date:data.get("date"),
      gradeDate:data.get("gradeDate"),
      notes:data.get("notes").trim(),
      seriesId:data.get("seriesId") || ""
    };

    const majorTypes = [
      "Quiz",
      "Homework",
      "Lab",
      "Exam",
      "Project"
    ];

    const conflictExists =
      state.settings.preventActivityConflicts &&
      majorTypes.includes(baseActivity.type) &&
      state.activities.some(activity =>
        activity.id !== baseActivity.id &&
        activity.courseId === baseActivity.courseId &&
        activity.date === baseActivity.date &&
        majorTypes.includes(activity.type)
      );

    if (conflictExists) {
      alert(
        "This course already has a major activity on that date."
      );
      return;
    }

    if (existing) {
      Object.assign(existing, baseActivity);
    } else if (data.get("repeat") === "weekly") {
      const seriesId = uniqueId("series");
      const repeatDays = data.getAll("repeatDays");

      if (!repeatDays.length) {
        repeatDays.push(dayLetter(baseActivity.date));
      }

      for (
        let date = baseActivity.date;
        date <= data.get("repeatEnd");
        date = addDays(date, 1)
      ) {
        if (repeatDays.includes(dayLetter(date))) {
          state.activities.push({
            ...baseActivity,
            id:uniqueId("activity"),
            date,
            seriesId
          });
        }
      }
    } else {
      state.activities.push(baseActivity);
    }

    if (data.get("generate") !== "no") {
      state.tasks.push({
        id:uniqueId("task"),
        title:`Prepare ${baseActivity.title}`,
        courseId:baseActivity.courseId,
        plannedDate:addDays(baseActivity.date, -2),
        dueDate:baseActivity.date,
        minutes:baseActivity.type === "Exam" ? 90 : 45,
        priority:"medium",
        done:false,
        source:"auto",
        category:"Preparation"
      });

      if (data.get("generate") === "both") {
        const gradingDate =
          baseActivity.gradeDate ||
          addDays(baseActivity.date, 1);

        state.tasks.push({
          id:uniqueId("task"),
          title:`Grade ${baseActivity.title}`,
          courseId:baseActivity.courseId,
          plannedDate:gradingDate,
          dueDate:
            baseActivity.gradeDate ||
            addDays(baseActivity.date, 4),
          minutes:baseActivity.type === "Exam" ? 120 : 60,
          priority:"medium",
          done:false,
          source:"auto",
          category:"Grading"
        });
      }
    }

    closeModal();
    saveState();
    return;
  }

  if (form.id === "makeupForm") {
    const course = findCourse(data.get("courseId"));
    const makeupDate = data.get("date");

    course.makeupDates = [
      ...new Set([
        ...(course.makeupDates || []),
        makeupDate
      ])
    ].sort();

    closeModal();
    saveState();
    return;
  }

  if (form.id === "customNoClassForm") {
    state.customNoClass[data.get("date")] =
      data.get("reason").trim();

    form.reset();
    saveState();
  }
});

document.addEventListener("dragstart", event => {
  const activityId =
    event.target.closest("[data-drag-activity]")
      ?.dataset.dragActivity;

  if (activityId) {
    event.dataTransfer.setData("text/plain", activityId);
  }
});

document.addEventListener("dragover", event => {
  if (event.target.closest("[data-drop-date]")) {
    event.preventDefault();
  }
});

document.addEventListener("drop", event => {
  const dayCell = event.target.closest("[data-drop-date]");

  if (!dayCell) return;

  event.preventDefault();

  const activityId =
    event.dataTransfer.getData("text/plain");

  const activity = state.activities.find(
    item => item.id === activityId
  );

  if (activity) {
    activity.date = dayCell.dataset.dropDate;
    saveState();
    showToast("Activity moved.");
  }
});

/* -------------------------------------------------------------
   Fixed controls
------------------------------------------------------------- */

$("#mobileMenuButton").addEventListener("click", () => {
  $("#sidebar").classList.toggle("mobile-open");
});

$("#globalSearch").addEventListener("input", event => {
  state.search = event.target.value;
  state.taskFilter = "open";
  state.currentView = "tasks";
  renderAll();
});

$("#signInButton").addEventListener("click", async () => {
  try {
    $("#authStatus").textContent = "Opening Google sign-in…";
    $("#authStatus").classList.remove("error");

    await signInWithPopup(auth, googleProvider);
  } catch (error) {
    console.error(error);

    const cancelled = [
      "auth/popup-closed-by-user",
      "auth/cancelled-popup-request"
    ].includes(error.code);

    $("#authStatus").textContent =
      cancelled
        ? "Sign-in was cancelled."
        : "Google sign-in could not be completed.";

    $("#authStatus").classList.toggle("error", !cancelled);
  }
});

$("#signOutButton").addEventListener("click", async () => {
  try {
    clearTimeout(saveTimer);

    if (pendingState && cloudReady) {
      await writeCloudState(pendingState);
    }

    pendingState = null;
    await signOut(auth);
  } catch (error) {
    console.error(error);
    setSyncStatus("error", "Unable to sign out");
  }
});

$("#syncChip").addEventListener("click", () => {
  showToast($("#syncText").textContent);
});

$("#drawerBackdrop").addEventListener(
  "click",
  closeDayDrawer
);

$("#modalBackdrop").addEventListener("click", event => {
  if (event.target === event.currentTarget) {
    closeModal();
  }
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closeDayDrawer();
    closeModal();
    closeMobileSidebar();
  }

  if (
    (event.ctrlKey || event.metaKey) &&
    event.key.toLowerCase() === "k"
  ) {
    event.preventDefault();
    $("#globalSearch").focus();
  }
});

/* -------------------------------------------------------------
   Authentication
------------------------------------------------------------- */

try {
  await setPersistence(auth, inMemoryPersistence);
} catch (error) {
  console.warn("In-memory authentication persistence failed.", error);
}

onAuthStateChanged(auth, async user => {
  currentUser = user;
  cloudReady = false;

  if (!user) {
    document.body.classList.add("auth-required");
    $("#authStatus").textContent = "Sign in to continue.";
    $("#authStatus").classList.remove("error");
    return;
  }

  if (!user.emailVerified) {
    await signOut(auth);

    $("#authStatus").textContent =
      "Please use a verified Google account.";

    $("#authStatus").classList.add("error");
    return;
  }

  isAdmin =
    String(user.email || "").toLowerCase() ===
    ADMIN_EMAIL;

  $("#profileName").textContent =
    user.displayName || user.email;

  $("#profileSubtitle").textContent =
    isAdmin
      ? "Administrator"
      : "Faculty account";

  $("#profileAvatar").textContent =
    String(user.displayName || user.email || "A")
      .split(/\s+/)
      .map(part => part[0])
      .join("")
      .slice(0, 2)
      .toUpperCase();

  document.body.classList.remove("auth-required");

  try {
    await loadSharedAcademicCalendars();
  } catch (error) {
    console.warn("Shared academic calendars could not be loaded.", error);

    SEMESTERS = structuredClone(FALLBACK_SEMESTERS);
  }

  state = normalizeState(state);
  renderAll();

  try {
    await loadCloudState();
  } catch (error) {
    console.error(error);
    setSyncStatus("error", "Unable to load");
  }
});

window.addEventListener("offline", () => {
  setSyncStatus("error", "Offline");
});

window.addEventListener("online", () => {
  if (currentUser && cloudReady) {
    if (pendingState) {
      queueCloudSave(pendingState);
    } else {
      setSyncStatus("saved", "Saved");
    }
  }
});

/* -------------------------------------------------------------
   Start
------------------------------------------------------------- */

state = normalizeState(state);
renderAll();
tryLoadingExpandedCourseSuggestions();
</script>
