<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Acadence — Faculty Semester Planner</title>
<meta name="theme-color" content="#17162f">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2317162f'/%3E%3Cpath d='M14 48 28 15l14 33M20 35h17' fill='none' stroke='%23fff' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='m39 34 5 5 9-11' fill='none' stroke='%23b9a7ff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">

<style>
:root {
  --nav:#17162f;
  --nav2:#211e43;
  --primary:#6c56d8;
  --primary2:#5138c7;
  --soft:#f0edff;
  --bg:#f6f7fb;
  --surface:#fff;
  --surface2:#fafafe;
  --text:#24243a;
  --muted:#6b6c82;
  --line:#e4e5ef;
  --line2:#d4d5e2;
  --danger:#b42318;
  --dangerSoft:#fff0ee;
  --warning:#9a5b00;
  --warningSoft:#fff7e6;
  --success:#217a4c;
  --successSoft:#eaf8f0;
  --info:#247795;
  --infoSoft:#eefaff;
  --shadow:0 7px 25px rgba(29,25,68,.08);
  --radius:17px;
  --sidebar:238px;
}

* { box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

button,input,select,textarea { font:inherit; }
button { cursor:pointer; }
button:disabled { cursor:not-allowed; opacity:.55; }

input,select,textarea {
  width:100%;
  border:1px solid var(--line2);
  border-radius:10px;
  padding:9px 10px;
  background:white;
  color:var(--text);
  font-size:12px;
}

textarea {
  min-height:88px;
  resize:vertical;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline:3px solid rgba(108,86,216,.25);
  outline-offset:2px;
}

.hidden { display:none !important; }

.auth-screen {
  position:fixed;
  inset:0;
  z-index:999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 50% 12%, #353164 0, #17162f 47%, #0e0d20 100%);
}

body.auth-required .auth-screen { display:flex; }
body.auth-required .app-shell,
body.auth-required .mobile-nav { visibility:hidden; }

.auth-card {
  width:min(430px,100%);
  background:white;
  border-radius:24px;
  padding:32px;
  text-align:center;
  box-shadow:0 30px 90px rgba(0,0,0,.34);
}

.auth-logo,
.brand-logo {
  display:grid;
  place-items:center;
  background:linear-gradient(145deg,#8e7cf1,#5b43cf);
  color:white;
  font-weight:900;
}

.auth-logo {
  width:64px;
  height:64px;
  margin:0 auto 16px;
  border-radius:19px;
  font-size:31px;
}

.auth-card h1 {
  margin:0;
  font-size:30px;
  letter-spacing:-.7px;
}

.auth-card p {
  margin:9px 0 22px;
  color:var(--muted);
  font-size:13.5px;
  line-height:1.55;
}

.auth-status {
  min-height:20px;
  margin-top:13px;
  color:var(--muted);
  font-size:12px;
}

.auth-status.error { color:var(--danger); }

.sidebar {
  position:fixed;
  inset:0 auto 0 0;
  z-index:40;
  width:var(--sidebar);
  padding:18px 14px;
  display:flex;
  flex-direction:column;
  color:white;
  background:linear-gradient(180deg,var(--nav),#111027 72%);
}

.brand {
  display:flex;
  align-items:center;
  gap:11px;
  padding:5px 7px 20px;
}

.brand-logo {
  width:43px;
  height:43px;
  border-radius:13px;
  font-size:22px;
  box-shadow:0 8px 22px rgba(94,67,207,.34);
}

.brand strong {
  display:block;
  font-size:20px;
  letter-spacing:-.5px;
}

.brand small {
  display:block;
  margin-top:1px;
  color:#b9bad1;
  font-size:10.5px;
}

.nav-label {
  padding:8px 12px 6px;
  color:#9293ad;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:10px;
}

.side-nav {
  display:flex;
  flex-direction:column;
  gap:4px;
}

.nav-button {
  width:100%;
  border:0;
  border-radius:11px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:11px;
  background:transparent;
  color:#c8c9da;
  font-size:13.5px;
  font-weight:650;
  text-align:left;
}

.nav-button:hover {
  background:rgba(255,255,255,.07);
  color:white;
}

.nav-button.active {
  color:white;
  background:linear-gradient(90deg,rgba(142,124,241,.25),rgba(108,86,216,.13));
  box-shadow:inset 3px 0 #a998ff;
}

.nav-icon {
  width:22px;
  text-align:center;
  font-size:16px;
}

.nav-badge {
  margin-left:auto;
  border-radius:999px;
  padding:2px 6px;
  background:#f7c65d;
  color:#3f2a00;
  font-size:9px;
}

.sidebar-bottom { margin-top:auto; }

.profile-box {
  padding:12px 8px;
  border-top:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  gap:9px;
}

.profile-avatar {
  width:34px;
  height:34px;
  flex:0 0 auto;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:#e8e3ff;
  color:#4d35b7;
  font-size:11px;
  font-weight:900;
}

.profile-text {
  min-width:0;
  flex:1;
}

.profile-text strong,
.profile-text small {
  display:block;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.profile-text strong { font-size:12px; }
.profile-text small {
  margin-top:2px;
  color:#aaaabd;
  font-size:10px;
}

.signout-button {
  border:0;
  border-radius:8px;
  padding:6px;
  background:transparent;
  color:#aaaabd;
}

.signout-button:hover {
  color:white;
  background:rgba(255,255,255,.08);
}

.main {
  min-height:100vh;
  margin-left:var(--sidebar);
}

.topbar {
  position:sticky;
  top:0;
  z-index:25;
  height:68px;
  padding:0 28px;
  border-bottom:1px solid rgba(218,219,231,.85);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:rgba(246,247,251,.9);
  backdrop-filter:blur(14px);
}

.top-left,
.top-right {
  display:flex;
  align-items:center;
  gap:9px;
}

.mobile-menu-button { display:none; }

.semester-select {
  width:auto;
  min-width:145px;
  font-weight:750;
}

.sync-chip {
  width:auto;
  border:0;
  border-radius:999px;
  padding:7px 10px;
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--successSoft);
  color:var(--success);
  font-size:11px;
  font-weight:750;
}

.sync-chip.saving {
  background:#fff3ce;
  color:#795600;
}

.sync-chip.error {
  background:var(--dangerSoft);
  color:var(--danger);
}

.search-box { position:relative; }

.search-box input {
  width:245px;
  padding-left:34px;
}

.search-box span {
  position:absolute;
  left:11px;
  top:9px;
  color:#8a8b9e;
}

.content {
  max-width:1550px;
  margin:auto;
  padding:26px 28px 92px;
}

.view { display:none; }
.view.active { display:block; }

.page-heading {
  margin-bottom:20px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
}

.eyebrow {
  margin-bottom:5px;
  color:var(--primary2);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:10.5px;
  font-weight:850;
}

.page-heading h1 {
  margin:0;
  font-size:27px;
  line-height:1.1;
  letter-spacing:-.65px;
}

.page-heading p {
  margin:7px 0 0;
  max-width:740px;
  color:var(--muted);
  font-size:13px;
}

.page-actions {
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:8px;
}

.button {
  width:auto;
  border:1px solid var(--line2);
  border-radius:11px;
  padding:9px 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:white;
  color:var(--text);
  font-size:12px;
  font-weight:750;
  text-decoration:none;
}

.button:hover {
  background:#faf9ff;
  border-color:#bdb7e3;
}

.button.primary {
  border-color:transparent;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  box-shadow:0 6px 16px rgba(81,56,199,.22);
}

.button.danger {
  border-color:#ffd2cd;
  background:var(--dangerSoft);
  color:var(--danger);
}

.button.small {
  padding:6px 9px;
  border-radius:9px;
  font-size:10.5px;
}

.icon-button {
  width:34px;
  height:34px;
  border:1px solid var(--line);
  border-radius:10px;
  display:grid;
  place-items:center;
  background:white;
  color:#5c5d70;
}

.text-button {
  width:auto;
  border:0;
  padding:2px;
  background:transparent;
  color:var(--primary2);
  font-size:11px;
  font-weight:800;
}

.grid {
  display:grid;
  gap:16px;
}

.grid.two { grid-template-columns:repeat(2,minmax(0,1fr)); }
.grid.three { grid-template-columns:repeat(3,minmax(0,1fr)); }

.dashboard-grid {
  grid-template-columns:minmax(0,1.35fr) minmax(330px,.75fr);
}

.card {
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  background:var(--surface);
  box-shadow:var(--shadow);
}

.card + .card,
.section-gap { margin-top:16px; }

.card-header {
  margin-bottom:14px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.card-header h2 {
  margin:0;
  font-size:15.5px;
}

.card-header p {
  margin:4px 0 0;
  color:var(--muted);
  font-size:11.5px;
}

.empty-state {
  padding:28px 14px;
  border:1px dashed var(--line2);
  border-radius:12px;
  color:var(--muted);
  font-size:12px;
  text-align:center;
}

.welcome-card {
  position:relative;
  overflow:hidden;
  background:linear-gradient(125deg,#f1efff,#fff 62%);
}

.welcome-card::after {
  content:"";
  position:absolute;
  width:245px;
  height:245px;
  right:-75px;
  top:-125px;
  border-radius:50%;
  background:rgba(108,86,216,.07);
}

.welcome-content {
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-between;
  gap:15px;
}

.welcome-card h2 {
  margin:0 0 6px;
  font-size:22px;
  letter-spacing:-.45px;
}

.welcome-card p {
  max-width:590px;
  margin:0;
  color:var(--muted);
  font-size:12.5px;
}

.summary-pills {
  margin-top:16px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.summary-pill {
  border:1px solid #dfdcf5;
  border-radius:999px;
  padding:7px 10px;
  background:white;
  color:#4d4773;
  font-size:10.5px;
  font-weight:750;
}

.summary-pill strong { color:var(--text); }

.timeline-row {
  min-height:68px;
  display:grid;
  grid-template-columns:68px 14px 1fr;
  gap:9px;
}

.timeline-time {
  padding-top:3px;
  color:var(--muted);
  font-size:10.5px;
  font-weight:800;
  text-align:right;
}

.timeline-axis { position:relative; }

.timeline-axis::before {
  content:"";
  position:absolute;
  top:8px;
  bottom:-8px;
  left:6px;
  width:2px;
  background:#e5e2f4;
}

.timeline-row:last-child .timeline-axis::before { display:none; }

.timeline-dot {
  position:absolute;
  top:6px;
  left:1px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--course);
  box-shadow:0 0 0 4px white;
}

.timeline-event {
  margin-bottom:9px;
  padding:9px 11px;
  border-left:4px solid var(--course);
  border-radius:10px;
  background:#fafafe;
}

.timeline-event strong {
  display:block;
  font-size:11.5px;
}

.timeline-event small {
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:10px;
}

.task-list {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.task-row {
  padding:10px 11px;
  border:1px solid var(--line);
  border-radius:12px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:start;
  background:white;
}

.task-row:hover { border-color:#ccc6ea; }

.task-checkbox {
  appearance:none;
  width:18px;
  height:18px;
  margin-top:2px;
  border:2px solid #bbb9cc;
  border-radius:6px;
  display:grid;
  place-content:center;
}

.task-checkbox:checked {
  border-color:var(--primary);
  background:var(--primary);
}

.task-checkbox:checked::after {
  content:"✓";
  color:white;
  font-size:11px;
  font-weight:900;
}

.task-row.done .task-title {
  color:#9293a3;
  text-decoration:line-through;
}

.task-title {
  font-size:11.5px;
  font-weight:780;
}

.task-meta {
  margin-top:4px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:5px;
  color:var(--muted);
  font-size:9.5px;
}

.tag {
  border-radius:999px;
  padding:2px 6px;
  background:#f1f1f6;
  color:#5e5f73;
  font-size:8.8px;
  font-weight:850;
}

.tag.high {
  background:#ffebe8;
  color:#9e251a;
}

.tag.medium {
  background:#fff5d9;
  color:#8e5900;
}

.tag.auto {
  background:#eeeaff;
  color:#5138c7;
}

.tag.online {
  background:var(--infoSoft);
  color:var(--info);
}

.tag.cancelled {
  background:var(--dangerSoft);
  color:var(--danger);
}

.menu-button {
  border:0;
  border-radius:8px;
  padding:3px 6px;
  background:transparent;
  color:#85869a;
}

.attention-list {
  display:flex;
  flex-direction:column;
  gap:9px;
}

.attention-item {
  padding:10px;
  border:1px solid var(--line);
  border-radius:11px;
  display:flex;
  align-items:center;
  gap:10px;
}

.course-dot {
  width:10px;
  height:32px;
  flex:0 0 auto;
  border-radius:999px;
  background:var(--course);
}

.attention-item strong {
  display:block;
  font-size:11px;
}

.attention-item small {
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:9.5px;
}

.attention-item .button:first-of-type { margin-left:auto; }

.warning-box,
.danger-box,
.success-box {
  padding:12px 13px;
  border-radius:13px;
  font-size:10.5px;
}

.warning-box {
  border:1px solid #f5d49d;
  background:var(--warningSoft);
  color:#78501a;
}

.danger-box {
  border:1px solid #ffd2cd;
  background:var(--dangerSoft);
  color:#8d2117;
}

.success-box {
  border:1px solid #bce4cd;
  background:var(--successSoft);
  color:#17643d;
}

.workload-bars {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.workload-row {
  display:grid;
  grid-template-columns:35px 1fr 44px;
  gap:8px;
  align-items:center;
}

.workload-row strong {
  color:#5c5d71;
  font-size:10px;
}

.workload-row small {
  color:var(--muted);
  font-size:9.5px;
  text-align:right;
}

.bar-track {
  height:9px;
  overflow:hidden;
  border-radius:999px;
  background:#eeeef4;
}

.bar-fill {
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#8c79eb,#624bd2);
}

.bar-fill.over {
  background:linear-gradient(90deg,#ef9a62,#cf574b);
}

.planner-toolbar {
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.segmented {
  padding:3px;
  border-radius:11px;
  display:inline-flex;
  gap:2px;
  background:#ececf3;
}

.segment {
  width:auto;
  border:0;
  border-radius:9px;
  padding:7px 10px;
  background:transparent;
  color:#68697b;
  font-size:10.5px;
  font-weight:800;
}

.segment.active {
  background:white;
  color:var(--text);
  box-shadow:0 2px 8px rgba(31,28,69,.09);
}

.calendar-shell {
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:white;
  box-shadow:var(--shadow);
}

.calendar-titlebar {
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.calendar-titlebar strong { font-size:15px; }

.calendar-scroll { overflow:auto; }

.month-grid {
  min-width:800px;
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:1px;
  background:var(--line);
}

.weekday-heading {
  padding:9px 10px;
  background:#f6f5fb;
  color:#707185;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:9px;
  font-weight:900;
}

.day-cell {
  position:relative;
  min-height:120px;
  padding:8px;
  background:white;
  cursor:pointer;
}

.day-cell:hover { background:#fbfaff; }
.day-cell.outside { background:#fafafd; color:#aaaabb; }
.day-cell.selected { background:#f7f5ff; }
.day-cell.today { box-shadow:inset 0 0 0 2px var(--primary); }
.day-cell.no-class { background:#fff9f1; }
.day-cell.online-day { background:#f2fbff; }

.day-number {
  width:25px;
  height:25px;
  margin-bottom:4px;
  border-radius:8px;
  display:grid;
  place-items:center;
  font-size:10.5px;
  font-weight:850;
}

.day-cell.today .day-number {
  background:var(--primary);
  color:white;
}

.calendar-item {
  margin:3px 0;
  padding:3px 4px;
  overflow:hidden;
  border-left:3px solid var(--course);
  border-radius:5px;
  background:#f7f7fb;
  color:#494a5d;
  font-size:8.8px;
  font-weight:750;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.calendar-item.activity { cursor:grab; }
.calendar-item.task {
  --course:#df8f2e;
  background:#fff8ec;
}
.calendar-item.holiday {
  --course:#c26d20;
  background:#fff0df;
  color:#8a450f;
}
.calendar-item.academic {
  --course:#6c56d8;
  background:#f1efff;
  color:#493b9c;
}
.calendar-item.exam {
  --course:#b42318;
  background:#fff0ee;
}

.more-count {
  color:var(--primary2);
  font-size:8.5px;
  font-weight:850;
}

.week-grid {
  padding:14px;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(7,minmax(170px,1fr));
  gap:9px;
}

.week-column {
  min-height:380px;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:13px;
  background:white;
}

.week-column-header {
  padding:10px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  font-size:10px;
  font-weight:850;
}

.week-column-header.today {
  background:var(--soft);
  color:var(--primary2);
}

.week-column-body { padding:8px; }

.week-block {
  margin-bottom:7px;
  padding:8px;
  border-left:4px solid var(--course);
  border-radius:8px;
  background:#f8f8fc;
}

.week-block strong {
  display:block;
  font-size:10.5px;
}

.week-block small {
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:9px;
}

.day-layout {
  padding:15px;
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);

    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  })[character]);

const parseDate = isoDate => new Date(`${isoDate}T12:00:00`);

const dateToIso = date => {
  const value = new Date(date);
  return [
    value.getFullYear(),
    String(value.getMonth() + 1).padStart(2, "0"),
    String(value.getDate()).padStart(2, "0")
  ].join("-");
};

const addDays = (isoDate, amount) => {

};

  if (!time) return "";
  const [hour, minute] = time.split(":").map(Number);
  return new Date(2000, 0, 1, hour, minute).toLocaleTimeString("en-US", {
    hour:"numeric",
    minute:"2-digit"
  });
};

const minutesFromTime = time => {
  const [hour, minute] = String(time || "00:00").split(":").map(Number);
  return (hour || 0) * 60 + (minute || 0);
};

const minutesLabel = minutes => {
  const value = Number(minutes) || 0;
  if (value < 60) return `${value}m`;
  const hours = Math.floor(value / 60);
  const remainder = value % 60;
  return remainder ? `${hours}h ${remainder}m` : `${hours}h`;
};

async function tryLoadingExpandedCourseSuggestions() {
  const possibleFiles = ["index-1.html", "acadence-old.html", "old-index.html"];

  for (const filename of possibleFiles) {
    try {
      const response = await fetch(filename, { cache:"no-store" });
      if (!response.ok) continue;

      const source = await response.text();
      const match = source.match(
        /const\s+COURSE_SUGGESTIONS\s*=\s*(\[\[.*?\]\]);/s
      );

      if (!match) continue;

      const suggestions = JSON.parse(match[1]);

      if (Array.isArray(suggestions) &&
          suggestions.length > COURSE_SUGGESTIONS.length) {
        COURSE_SUGGESTIONS = suggestions;
        renderAll();
        return;
      }
    } catch (error) {
      console.debug("Expanded course suggestions were not found.", error);
    }
  }
}

/* -------------------------------------------------------------
   Meeting calculations
------------------------------------------------------------- */

const cancellationKey = (courseId, date) => `${courseId}|${date}`;

function academicNoClassReason(date, course) {
  const semester = currentSemester();

  if (semester.noClass?.[date]) {
    return semester.noClass[date];
  }

  if (state.customNoClass?.[date]) {
    return state.customNoClass[date];
  }

  const partialRule = semester.partialNoClass?.[date];

  if (partialRule &&
      minutesFromTime(course?.start) >= minutesFromTime(partialRule.after)) {
    return partialRule.label;
  }

  return "";
}

const onlineReason = date =>
  currentSemester().onlineDays?.[date] || "";

function isRegularCourseDate(course, date) {
  const semester = currentSemester();

  return (
    date >= semester.start &&
    date <= semester.lastClass &&
    course.days?.includes(dayLetter(date))
  );
}

function courseMeetingStatus(course, date) {
  const regular = isRegularCourseDate(course, date);
  const makeup = (course.makeupDates || []).includes(date);

  if (!regular && !makeup) return null;

  if (regular) {
    const academicReason = academicNoClassReason(date, course);

    if (academicReason) {
      return {
        status:"academic-cancelled",
        reason:academicReason,
        regular:true,
        makeup:false
      };
    }

    const cancellation =
      state.cancellations[cancellationKey(course.id, date)];

    if (cancellation) {
      return {
        status:"instructor-cancelled",
        reason:cancellation,
        regular:true,
        makeup:false
      };
    }
  }

  return {
    status:"counted",
    online:Boolean(onlineReason(date)),
    makeup,
    regular
  };
}

function meetingDetails(course) {
  const semester = currentSemester();
  const rows = [];

  for (
    let date = semester.start;
    date <= semester.lastClass;
    date = addDays(date, 1)
  ) {
    const status = courseMeetingStatus(course, date);

    if (status) {
      rows.push({
        date,
        ...status
      });
    }
  }

  for (const makeupDate of course.makeupDates || []) {
    if (!rows.some(row => row.date === makeupDate)) {
      const status = courseMeetingStatus(course, makeupDate);

      if (status) {
        rows.push({
          date:makeupDate,
          ...status
        });
      }
    }
  }

  rows.sort((first, second) => first.date.localeCompare(second.date));

  let meetingNumber = 0;

  for (const row of rows) {
    if (row.status === "counted") {
      row.count = ++meetingNumber;
    }
  }

  return rows;
}

const countedMeetings = course =>
  meetingDetails(course).filter(row => row.status === "counted");

function meetingsOnDate(date, includeCancelled = false) {
  const rows = [];

  for (const course of state.courses) {
    const status = courseMeetingStatus(course, date);

    if (status && (includeCancelled || status.status === "counted")) {
      rows.push({
        ...course,
        date,
        meetingStatus:status
      });
    }
  }

  for (const block of state.blocks) {
    const semester = currentSemester();

    if (
      block.days?.includes(dayLetter(date)) &&
      date >= semester.start &&
      date <= semester.finalsEnd
    ) {
      rows.push({
        ...block,
        date,
        type:"block",
        meetingStatus:{ status:"counted" }
      });
    }
  }

  return rows.sort(
    (first, second) =>
      String(first.start || "99:99")
        .localeCompare(String(second.start || "99:99"))
  );
}

const activitiesOnDate = date =>
  state.activities.filter(activity => activity.date === date);

const tasksOnDate = date =>
  state.tasks.filter(task => task.plannedDate === date);

function academicEntriesForDate(date) {
  const semester = currentSemester();
  const entries = [];

  if (semester.noClass?.[date]) {
    entries.push({
      type:"holiday",
      text:semester.noClass[date]
    });
  }

  if (state.customNoClass?.[date]) {
    entries.push({
      type:"holiday",
      text:state.customNoClass[date]
    });
  }

  if (semester.onlineDays?.[date]) {
    entries.push({
      type:"online",
      text:semester.onlineDays[date]
    });
  }

  if (semester.partialNoClass?.[date]) {
    entries.push({
      type:"holiday",
      text:semester.partialNoClass[date].label
    });
  }

  for (const [entryDate, text] of semester.important || []) {
    if (entryDate === date) {
      entries.push({
        type:"important",
        text
      });
    }
  }

  return entries;
}

function setSyncStatus(status, text) {
  const chip = $("#syncChip");

  chip.className = `sync-chip ${
    status === "saving"
      ? "saving"
      : status === "error"
        ? "error"
        : ""
  }`;

  $("#syncText").textContent = text;
  $("#syncSymbol").textContent =
    status === "saving"
      ? "↻"
      : status === "error"
        ? "!"
        : "✓";
}

async function writeStorageBackup(nextState) {
  try {
    await uploadString(
      storageBackupReference(),
      JSON.stringify({
        state:nextState,
        updatedAtMs:Date.now()
      }),
      "raw",
      { contentType:"application/json" }
    );

    return true;
  } catch (error) {
    console.warn("Storage backup was unavailable.", error);
    return false;
  }
}

async function writeCloudState(nextState) {
  if (!currentUser || !cloudReady) return;

  setSyncStatus("saving", "Saving…");

  const now = Date.now();
  let firestoreSaved = false;
  let backupSaved = false;

  try {
    await setDoc(
      planDocumentReference(),
      {
        state:nextState,
        profile: {
          name:currentUser.displayName || "",
          email:currentUser.email || "",
          photoURL:currentUser.photoURL || ""
        },
        schemaVersion:3,
        updatedAt:serverTimestamp(),
        updatedAtMs:now
      },
      { merge:true }
    );

    firestoreSaved = true;
  } catch (error) {
    console.error("Firestore save failed.", error);
  }

  backupSaved = await writeStorageBackup(nextState);

  if (firestoreSaved || backupSaved) {
    setSyncStatus("saved", "Saved");
  } else {
    throw new Error("Both cloud saves failed.");
  }
}

function queueCloudSave(nextState) {
  pendingState = structuredClone(nextState);

  if (!currentUser || !cloudReady) return;

  clearTimeout(saveTimer);
  setSyncStatus("saving", "Saving…");

  saveTimer = setTimeout(async () => {
    const stateToSave = pendingState;
    pendingState = null;

    try {
      await writeCloudState(stateToSave);
    } catch (error) {
      console.error(error);
      pendingState = stateToSave;
      setSyncStatus("error", "Unable to save");
    }
  }, 650);
}

function saveState(render = true) {
  queueCloudSave(state);

  if (render) {
    renderAll();
  }
}

async function loadCloudState() {
  setSyncStatus("saving", "Loading…");

  let loadedState = null;

  try {
    const snapshot = await getDoc(planDocumentReference());

    if (snapshot.exists() && snapshot.data()?.state) {
      loadedState = snapshot.data().state;
    }
  } catch (error) {
    console.warn("Firestore load failed.", error);
  }

  if (!loadedState) {
    try {
      const bytes = await getBytes(
        storageBackupReference(),
        2 * 1024 * 1024
      );

      const backup = JSON.parse(
        new TextDecoder().decode(bytes)
      );

      loadedState = backup.state;
    } catch (error) {
      console.warn("Storage backup was unavailable.", error);
    }
  }

  cloudReady = true;

  if (loadedState) {
    state = normalizeState(loadedState);
  } else {
    await writeCloudState(state);
  }

  setSyncStatus("saved", "Saved");
  renderAll();
}

async function loadSharedAcademicCalendars() {
  const snapshot = await getDocs(
    collection(db, "acadenceAcademicCalendars")
  );

  const calendars = {};

  snapshot.forEach(calendarSnapshot => {
    const data = calendarSnapshot.data() || {};

    calendars[calendarSnapshot.id] = {
      label:data.label || calendarSnapshot.id,
      start:data.start,
      lastClass:data.lastClass,
      finalsStart:data.finalsStart,
      finalsEnd:data.finalsEnd,
      finalGradesDue:data.finalGradesDue,
      noClass:data.noClass || {},
      onlineDays:data.onlineDays || {},
      partialNoClass:data.partialNoClass || {},
      important:Array.isArray(data.important)
        ? data.important
        : []
    };
  });

  SEMESTERS = {
    ...structuredClone(FALLBACK_SEMESTERS),
    ...calendars
  };

  state = normalizeState(state);
}

function weekStartFor(date) {
  const parsed = parseDate(date);
  const desiredStart = state.weekStartsOn === "monday" ? 1 : 0;
  const difference = (parsed.getDay() - desiredStart + 7) % 7;
  parsed.setDate(parsed.getDate() - difference);
  return dateToIso(parsed);
}

function workloadData(anchorDate = state.selectedDate) {
  const weekStart = weekStartFor(anchorDate);

  return Array.from({ length:7 }, (_, index) => {
    const date = addDays(weekStart, index);

    const minutes = state.tasks
      .filter(task => !task.done && task.plannedDate === date)
      .reduce(
        (total, task) => total + (Number(task.minutes) || 0),
        0
      );

    return { date, minutes };
  });
}

function workloadBars() {
  const data = workloadData();
  const limit = Number(state.settings.dailyWorkloadMinutes) || 180;
  const maximum = Math.max(limit, ...data.map(row => row.minutes));

  return `
    <div class="workload-bars">
      ${data.map(row => `
        <div class="workload-row">
          <strong>${formatDate(row.date, { weekday:"short" })}</strong>

          <div class="bar-track">
            <div
              class="bar-fill ${row.minutes > limit ? "over" : ""}"
              style="width:${Math.min(100, row.minutes / maximum * 100)}%"
            ></div>
          </div>

          <small>${minutesLabel(row.minutes)}</small>
        </div>
      `).join("")}
    </div>
  `;
}

function monthDates() {
  const [year, month] = state.selectedMonth.split("-").map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const gridStart = new Date(firstDay);
  gridStart.setDate(1 - firstDay.getDay());

  return Array.from({ length:42 }, (_, index) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + index);
    return dateToIso(date);
  });
}

function renderMiniMonth(yearMonth) {
  const [year, month] = yearMonth.split("-").map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const gridStart = new Date(firstDay);
  gridStart.setDate(1 - firstDay.getDay());

  const dates = Array.from({ length:42 }, (_, index) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + index);
    return dateToIso(date);
  });

  return `
    <div class="mini-month">
      <h3>
        ${firstDay.toLocaleDateString("en-US", {
          month:"long",
          year:"numeric"
        })}
      </h3>

      <div class="mini-grid">
        ${["S","M","T","W","R","F","S"].map(day => `
          <div class="mini-cell"><strong>${day}</strong></div>
        `).join("")}

        ${dates.map(date => {
          const meetings = meetingsOnDate(date)
            .filter(courseIsVisible);

          const activities = activitiesOnDate(date)
            .filter(activity =>
              !state.courseFilter ||
              activity.courseId === state.courseFilter
            );

          return `
            <div class="mini-cell ${
              date.slice(0, 7) !== yearMonth ? "outside" : ""
            }">
              <strong>${parseDate(date).getDate()}</strong>

              ${meetings.slice(0, 2).map(meeting => `
                <span
                  class="mini-dot"
                  style="--course:${meeting.color}"
                ></span>
              `).join("")}

              ${
                activities.length
                  ? `<span
                       class="mini-dot"
                       style="--course:#b42318"
                     ></span>`
                  : ""
              }
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function renderSemesterPlanner() {
  const semester = currentSemester();
  const months = [];

  let yearMonth = semester.start.slice(0, 7);

  while (yearMonth <= semester.finalsEnd.slice(0, 7)) {
    months.push(yearMonth);

    const [year, month] = yearMonth.split("-").map(Number);
    const nextMonth = new Date(year, month, 1);

    yearMonth =
      `${nextMonth.getFullYear()}-` +
      `${String(nextMonth.getMonth() + 1).padStart(2, "0")}`;
  }

  return `
    <div class="semester-months">
      ${months.map(renderMiniMonth).join("")}
    </div>
  `;
}

function plannerWarnings() {
  const warnings = [];

  for (const activity of state.activities) {
    const course = findCourse(activity.courseId);

    if (
      currentSemester().noClass?.[activity.date] ||
      state.customNoClass?.[activity.date]
    ) {
      warnings.push(
        `${activity.title} is scheduled on a no-class date.`
      );
    }

    if (
      course &&
      !isRegularCourseDate(course, activity.date) &&
      !(course.makeupDates || []).includes(activity.date)
    ) {
      warnings.push(
        `${activity.title} is attached to ${course.code} on a day the course does not normally meet.`
      );
    }
  }

  for (const course of state.courses) {
    if (!course.finalDate) {
      warnings.push(
        `${course.code} does not have a final-examination date recorded.`
      );
    }
  }

  return warnings;
}

function deleteCourse(courseId) {
  const course = findCourse(courseId);

  if (!course) return;

  const activityCount = state.activities.filter(
    activity => activity.courseId === courseId
  ).length;

  const taskCount = state.tasks.filter(
    task => task.courseId === courseId
  ).length;

  const reflectionCount = state.reflections.filter(
    reflection => reflection.courseId === courseId
  ).length;

  const confirmed = confirm(
    `Delete ${course.code}?\n\n` +
    `This also removes ${activityCount} activities, ` +
    `${taskCount} tasks, ${reflectionCount} reflections, ` +
    `meeting notes, cancellations, and makeup dates.`
  );

  if (!confirmed) return;

  state.courses = state.courses.filter(
    item => item.id !== courseId
  );

  state.activities = state.activities.filter(
    activity => activity.courseId !== courseId
  );

  state.tasks = state.tasks.filter(
    task => task.courseId !== courseId
  );

  state.reflections = state.reflections.filter(
    reflection => reflection.courseId !== courseId
  );

  for (const key of Object.keys(state.cancellations)) {
    if (key.startsWith(`${courseId}|`)) {
      delete state.cancellations[key];
    }
  }

  for (const key of Object.keys(state.meetingNotes)) {
    if (key.startsWith(`${courseId}|`)) {
      delete state.meetingNotes[key];
    }
  }

  if (state.dayCountCourseId === courseId) {
    state.dayCountCourseId = state.courses[0]?.id || "";
  }

  closeModal();
  saveState();
  showToast("Course deleted.");
}

function dayCountSummary(course) {
  const rows = meetingDetails(course);
  const counted = rows.filter(row => row.status === "counted");
  const academicCancelled = rows.filter(
    row => row.status === "academic-cancelled"
  );
  const instructorCancelled = rows.filter(
    row => row.status === "instructor-cancelled"
  );
  const online = counted.filter(row => row.online);
  const makeup = counted.filter(row => row.makeup);
  const completed = counted.filter(row => row.date < TODAY);
  const remaining = counted.filter(row => row.date >= TODAY);

  return {
    rows,
    counted,
    academicCancelled,
    instructorCancelled,
    online,
    makeup,
    completed,
    remaining
  };
}

function dayCountColumns(course) {
  const allColumns = ["M","T","W","R","F","S"];

  if (state.dayCountLayout === "full") {
    return allColumns;
  }

  const selectedDays = new Set(course.days || []);

  for (const makeupDate of course.makeupDates || []) {
    selectedDays.add(dayLetter(makeupDate));
  }

  return allColumns.filter(day => selectedDays.has(day));
}

function buildDayCountTable(course) {
  const summary = dayCountSummary(course);

  const rowsByDate = Object.fromEntries(
    summary.rows.map(row => [row.date, row])
  );

  const columns = dayCountColumns(course);

  const weekdayOffsets = {
    M:0,
    T:1,
    W:2,
    R:3,
    F:4,
    S:5
  };

  const semester = currentSemester();

  let cursor = parseDate(semester.start);
  cursor.setDate(
    cursor.getDate() -
    ((cursor.getDay() + 6) % 7)
  );

  const tableRows = [];
  let lastMonth = "";

  while (dateToIso(cursor) <= semester.lastClass) {
    const weekDates = Array.from({ length:6 }, (_, index) => {
      const date = new Date(cursor);
      date.setDate(cursor.getDate() + index);
      return dateToIso(date);
    });

    const dateWithinSemester =
      weekDates.find(
        date =>
          date >= semester.start &&
          date <= semester.lastClass
      ) || semester.start;

    const monthName = formatDate(
      dateWithinSemester,
      { month:"long" }
    );

    const monthLabel =
      monthName !== lastMonth
        ? monthName
        : "";

    if (monthLabel) {
      lastMonth = monthName;
    }

    const cells = columns.map(column => {
      const date = weekDates[weekdayOffsets[column]];
      const row = rowsByDate[date];

      if (!row) {
        return `<td></td>`;
      }

      const activityCount = state.activities.filter(
        activity =>
          activity.courseId === course.id &&
          activity.date === date
      ).length;

      let token = "";

      if (row.status === "academic-cancelled") {
        token = `
          <span
            class="removed-token"
            title="${escapeHtml(row.reason)}"
          >
            [${parseDate(date).getDate()}]
          </span>
        `;
      } else if (row.status === "instructor-cancelled") {
        token = `
          <span
            class="meeting-token cancelled"
            title="${escapeHtml(row.reason)}"
          >
            ${parseDate(date).getDate()}
          </span>
        `;
      } else {
        token = `
          <span
            class="meeting-token
              ${row.online ? "online" : ""}
              ${row.makeup ? "makeup" : ""}
            "
            title="Meeting ${row.count}
              ${row.online ? " — online" : ""}
              ${row.makeup ? " — makeup" : ""}
            "
          >
            ${parseDate(date).getDate()}<sup>${row.count}</sup>
          </span>
        `;
      }

      return `
        <td class="${date === TODAY ? "today-cell" : ""}">
          ${token}
          ${
            activityCount
              ? `<span
                   class="activity-dot"
                   title="${activityCount} teaching activity"
                 ></span>`
              : ""
          }
        </td>
      `;
    });

    tableRows.push(`
      <tr>
        <td class="month-cell">${monthLabel}</td>
        ${cells.join("")}
      </tr>
    `);

    cursor.setDate(cursor.getDate() + 7);
  }

  const dayNames = {
    M:"Monday",
    T:"Tuesday",
    W:"Wednesday",
    R:"Thursday",
    F:"Friday",
    S:"Saturday"
  };

  return {
    summary,
    columns,
    html:`
      <table class="daycount-table">
        <thead>
          <tr>
            <th></th>

            ${columns.map(column => `
              <th>
                ${dayNames[column]}<br>
                <small>(${column})</small>
              </th>
            `).join("")}
          </tr>
        </thead>

        <tbody>
          ${tableRows.join("")}
        </tbody>
      </table>
    `
  };
}

function taskMatchesFilter(task) {
  const query = state.search.trim().toLowerCase();

  if (
    query &&
    !`${task.title} ${findCourse(task.courseId)?.code || ""} ${task.category || ""}`
      .toLowerCase()
      .includes(query)
  ) {
    return false;
  }

  const weekStart = weekStartFor(TODAY);
  const weekEnd = addDays(weekStart, 6);

  if (state.taskFilter === "today") {
    return task.plannedDate === TODAY;
  }

  if (state.taskFilter === "week") {
    const date = task.plannedDate || task.dueDate;
    return date && date >= weekStart && date <= weekEnd;
  }

  if (state.taskFilter === "overdue") {
    return !task.done && task.dueDate && task.dueDate < TODAY;
  }

  if (state.taskFilter === "unscheduled") {
    return !task.done && !task.plannedDate;
  }

  if (state.taskFilter === "completed") {
    return task.done;
  }

  return !task.done;
}

function autoScheduleTasks() {
  const pendingTasks = state.tasks
    .filter(task => !task.done && !task.plannedDate)
    .sort(
      (first, second) =>
        String(first.dueDate || "9999")
          .localeCompare(String(second.dueDate || "9999"))
    );

  for (const task of pendingTasks) {
    let bestDate = "";
    let lowestLoad = Infinity;

    const finalDate = task.dueDate || currentSemester().finalsEnd;

    for (
      let date = TODAY;
      date <= finalDate;
      date = addDays(date, 1)
    ) {
      const weekday = parseDate(date).getDay();

      if (weekday === 0 || weekday === 6) continue;

      const load = state.tasks
        .filter(item => !item.done && item.plannedDate === date)
        .reduce(
          (total, item) =>
            total + (Number(item.minutes) || 0),
          0
        );

      if (load < lowestLoad) {
        bestDate = date;
        lowestLoad = load;
      }
    }

    task.plannedDate = bestDate || finalDate;
  }

  saveState();
  showToast("Unscheduled tasks were placed before their deadlines.");
}

function balanceCurrentWeek() {
  const weekStart = weekStartFor(TODAY);
  const weekDates = Array.from(
    { length:7 },
    (_, index) => addDays(weekStart, index)
  );

  const loads = Object.fromEntries(
    weekDates.map(date => [date, 0])
  );

  const tasks = state.tasks
    .filter(task => {
      if (task.done) return false;

      const date = task.plannedDate || task.dueDate;

      return (
        date &&
        date >= weekStart &&
        date <= addDays(weekStart, 6)
      );
    })
    .sort(
      (first, second) =>
        (Number(second.minutes) || 0) -
        (Number(first.minutes) || 0)
    );

  for (const task of tasks) {
    const validDates = weekDates.filter(
      date => !task.dueDate || date <= task.dueDate
    );

    const candidateDates = validDates.length
      ? validDates
      : weekDates;

    const targetDate = [...candidateDates]
      .sort((first, second) => loads[first] - loads[second])[0];

    task.plannedDate = targetDate;
    loads[targetDate] += Number(task.minutes) || 0;
  }

  saveState();
  showToast("The week was balanced by estimated workload.");
}

function saveReflection() {
  const courseId = $("#reflectionCourseId")?.value;
  const date = $("#reflectionDate")?.value;

  if (!courseId || !date) return;

  const selectedChoice = key =>
    document.querySelector(
      `[data-choice="${key}"] .choice-button.active`
    )?.textContent.trim() || "";

  const note = $("#reflectionNote").value.trim();
  const carry = $("#reflectionCarry").value.trim();

  const existing = state.reflections.find(
    reflection =>
      reflection.courseId === courseId &&
      reflection.date === date
  );

  const reflection = {
    id:existing?.id || uniqueId("reflection"),
    courseId,
    date,
    engagement:selectedChoice("engagement"),
    pacing:selectedChoice("pacing"),
    clarity:selectedChoice("clarity"),
    note:note || "Reflection recorded.",
    carry
  };

  if (existing) {
    Object.assign(existing, reflection);
  } else {
    state.reflections.push(reflection);
  }

  if (
    carry &&
    !state.tasks.some(
      task => task.sourceReflectionId === reflection.id
    )
  ) {
    const course = findCourse(courseId);

    const nextDate =
      countedMeetings(course)
        .map(row => row.date)
        .find(meetingDate => meetingDate > date) ||
      date;

    state.tasks.push({
      id:uniqueId("task"),
      title:carry,
      courseId,
      plannedDate:nextDate,
      dueDate:nextDate,
      minutes:20,
      priority:"medium",
      done:false,
      source:"auto",
      category:"Preparation",
      sourceReflectionId:reflection.id
    });
  }

  saveState();
  showToast("Reflection saved.");
}

  if (state.morePanel === "syllabusChecklist") {
    return checklistPanel("syllabus");
  }

  if (state.morePanel === "finals") {
    return finalsPanel();
  }

  if (state.morePanel === "export") {

function renderMore() {
  const cards = [
    ["academic","▦","Academic calendar","Official class dates, breaks, online days, and deadlines."],
    ["schedule","◷","Weekly schedule","Classes, office hours, meetings, and protected time."],
    ["semesterChecklist","✓","Pre-semester checklist","Prepare courses, Canvas, materials, and first-week plans."],
    ["syllabusChecklist","☷","Syllabus checklist","Verify required information and internal consistency."],
    ["finals","⚑","Finals and deadlines","Review final examinations and grade-submission dates."],
    ["export","⇩","Export","Print, CSV, ICS, and JSON exports."],

  $("#view-more").innerHTML = `

      `<button class="button primary" data-add="task">＋ Add task</button>`

function openDayDrawer(date) {
  state.selectedDate = date;

  const meetings = meetingsOnDate(date, true);
  const activities = activitiesOnDate(date);
  const tasks = tasksOnDate(date);
  const academicEntries = academicEntriesForDate(date);

  $("#dayDrawer").innerHTML = `
    <div class="drawer-header">
      <div>
        <h2>${formatDate(date)}</h2>

        <p>
          ${meetings.length} schedule item${meetings.length === 1 ? "" : "s"}
          · ${tasks.filter(task => !task.done).length}
          open task${tasks.filter(task => !task.done).length === 1 ? "" : "s"}
        </p>
      </div>

      <button class="icon-button" data-close-drawer>×</button>
    </div>

    <div class="drawer-body">
      ${
        academicEntries.length
          ? `
            <section class="drawer-section">
              <h3>Academic calendar</h3>

              ${academicEntries.map(entry => `
                <div class="warning-box" style="margin-bottom:6px">
                  ${escapeHtml(entry.text)}
                </div>
              `).join("")}
            </section>
          `
          : ""
      }

      <section class="drawer-section">
        <h3>Schedule</h3>

        ${
          meetings.map(meeting => `
            <div class="drawer-item">
              <div class="drawer-item-top">
                <strong>
                  ${escapeHtml(meeting.code)}
                  · ${escapeHtml(meeting.title)}
                </strong>

                ${
                  meeting.type !== "block"
                    ? `
                      <span class="tag ${
                        meeting.meetingStatus.status === "counted"
                          ? meeting.meetingStatus.online
                            ? "online"
                            : ""
                          : "cancelled"
                      }">
                        ${
                          meeting.meetingStatus.status === "counted"
                            ? meeting.meetingStatus.online
                              ? "Online"
                              : "Counted"
                            : "Cancelled"
                        }
                      </span>
                    `
                    : ""
                }
              </div>

              <small>
                ${formatTime(meeting.start)}–
                ${formatTime(meeting.end)}
                · ${escapeHtml(courseLocation(meeting))}
              </small>

              ${
                meeting.type !== "block"
                  ? `
                    <div class="drawer-actions">
                      ${
                        meeting.meetingStatus.status === "counted" &&
                        !meeting.meetingStatus.makeup
                          ? `
                            <button
                              class="button small danger"
                              data-toggle-cancellation="${meeting.id}|${date}"
                            >
                              Cancel class
                            </button>
                          `
                          : meeting.meetingStatus.status === "instructor-cancelled"
                            ? `
                              <button
                                class="button small"
                                data-toggle-cancellation="${meeting.id}|${date}"
                              >
                                Restore class
                              </button>
                            `
                            : ""
                      }
                    </div>

                    <div class="field section-gap">
                      <label>Meeting note</label>

                      <textarea
                        data-meeting-note="${meeting.id}|${date}"
                        placeholder="Lecture plan, room change, reminder…"
                      >${escapeHtml(
                        state.meetingNotes[
                          cancellationKey(meeting.id, date)
                        ] || ""
                      )}</textarea>
                    </div>
                  `
                  : ""
              }
            </div>
          `).join("") ||
          `<div class="empty-state">No scheduled blocks.</div>`
        }
      </section>

      <section class="drawer-section">
        <h3>Activities</h3>

        ${
          activities.map(activity => `
            <div class="drawer-item">
              <div class="drawer-item-top">
                <strong>${escapeHtml(activity.title)}</strong>

                <button
                  class="text-button"
                  data-edit-activity="${activity.id}"
                >
                  Edit
                </button>
              </div>

              <small>
                ${escapeHtml(activity.type)}
                · ${escapeHtml(
                  findCourse(activity.courseId)?.code || "General"
                )}
              </small>
            </div>
          `).join("") ||
          `<div class="empty-state">No activities.</div>`
        }
      </section>

      <section class="drawer-section">
        <h3>Faculty tasks</h3>

        <div class="task-list">
          ${
            tasks.map(taskRow).join("") ||
            `<div class="empty-state">No tasks.</div>`
          }
        </div>
      </section>
    </div>

    <div class="drawer-footer">
      <button
        class="button"
        data-add-activity-date="${date}"
      >
        Add activity
      </button>

      <button
        class="button primary"
        data-add-task-date="${date}"
      >
        Add task
      </button>
    </div>
  `;

  $("#drawerBackdrop").classList.add("open");
  $("#dayDrawer").classList.add("open");
}

  $("#drawerBackdrop").classList.remove("open");
  $("#dayDrawer").classList.remove("open");

function openModal(type, data = {}) {
  const modalHtml =
    type === "course"
      ? courseModal(data)
      : type === "block"
        ? blockModal(data)
        : type === "activity"
          ? activityModal(data)
          : type === "makeup"
            ? makeupModal(data.courseId)
            : taskModal(data);

  $("#modal").innerHTML = modalHtml;
  $("#modalBackdrop").classList.add("open");

  if (type === "course") {
    const form = $("#courseForm");

    form.elements.code.addEventListener(
      "change",
      () => applyCourseSuggestion("code")
    );

    form.elements.code.addEventListener(
      "blur",
      () => applyCourseSuggestion("code")
    );

    form.elements.title.addEventListener(
      "change",
      () => applyCourseSuggestion("title")
    );

    form.elements.title.addEventListener(
      "blur",
      () => applyCourseSuggestion("title")
    );
  }
}

}

function applyCourseSuggestion(source) {
  const form = $("#courseForm");

  if (!form) return;

  const target = String(
    form.elements[source].value || ""
  ).trim().toLowerCase();

  if (!target) return;

  const valueIndex = source === "code" ? 0 : 1;

  const matches = COURSE_SUGGESTIONS.filter(
    row =>
      String(row[valueIndex] || "")
        .trim()
        .toLowerCase() === target
  );

  const semesterLabel = currentSemester().label;

  const suggestion =
    matches.find(row => row[2] === semesterLabel) ||
    matches.find(row => row[2] === "Fall 2026") ||
    matches[0];

  if (!suggestion) return;

  form.elements.code.value = suggestion[0] || "";
  form.elements.title.value = suggestion[1] || "";
  form.elements.credits.value = suggestion[3] || "";
  form.elements.building.value = suggestion[4] || "";
  form.elements.room.value = suggestion[5] || "";

  $("#courseSuggestionNote").textContent =
    `Filled from the ${suggestion[2]} schedule: ` +
    `${suggestion[0]} · ${suggestion[1]}` +
    `${suggestion[3] ? ` · ${suggestion[3]} credits` : ""}.`;
}

function exportCalendarIcs() {
  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Acadence//Faculty Planner//EN",
    "CALSCALE:GREGORIAN"
  ];

  const timestamp = new Date()
    .toISOString()
    .replace(/[-:]/g, "")
    .replace(/\.\d{3}Z$/, "Z");

  const dateTime = (date, time) =>
    `${date.replaceAll("-", "")}T${String(time || "09:00").replace(":", "")}00`;

  const escapeIcs = text =>
    String(text || "")
      .replace(/\\/g, "\\\\")
      .replace(/\n/g, "\\n")
      .replace(/,/g, "\\,")
      .replace(/;/g, "\\;");

  for (const course of state.courses) {
    for (const meeting of countedMeetings(course)) {
      lines.push(
        "BEGIN:VEVENT",
        `UID:${course.id}-${meeting.date}@acadence`,
        `DTSTAMP:${timestamp}`,
        `DTSTART:${dateTime(meeting.date, course.start)}`,
        `DTEND:${dateTime(meeting.date, course.end)}`,
        `SUMMARY:${escapeIcs(`${course.code} ${course.title}`)}`,
        `LOCATION:${escapeIcs(courseLocation(course))}`,
        `DESCRIPTION:${
          meeting.online
            ? "Online class meeting"
            : meeting.makeup
              ? "Makeup class meeting"
              : "Class meeting"
        }`,
        "END:VEVENT"
      );
    }

    if (course.finalDate) {
      lines.push(
        "BEGIN:VEVENT",
        `UID:${course.id}-final@acadence`,
        `DTSTAMP:${timestamp}`,
        course.finalStart
          ? `DTSTART:${dateTime(course.finalDate, course.finalStart)}`
          : `DTSTART;VALUE=DATE:${course.finalDate.replaceAll("-", "")}`,
        course.finalEnd
          ? `DTEND:${dateTime(course.finalDate, course.finalEnd)}`
          : `DTEND;VALUE=DATE:${addDays(course.finalDate, 1).replaceAll("-", "")}`,
        `SUMMARY:${escapeIcs(`${course.code} Final Examination`)}`,
        `LOCATION:${escapeIcs(course.finalRoom || courseLocation(course))}`,
        "END:VEVENT"
      );
    }
  }

  for (const activity of state.activities) {
    const course = findCourse(activity.courseId);

    lines.push(
      "BEGIN:VEVENT",
      `UID:${activity.id}@acadence`,
      `DTSTAMP:${timestamp}`,
      `DTSTART;VALUE=DATE:${activity.date.replaceAll("-", "")}`,
      `DTEND;VALUE=DATE:${addDays(activity.date, 1).replaceAll("-", "")}`,
      `SUMMARY:${escapeIcs(`${course?.code || ""} ${activity.title}`.trim())}`,
      `DESCRIPTION:${escapeIcs(
        `${activity.type}${activity.notes ? ` — ${activity.notes}` : ""}`
      )}`,
      "END:VEVENT"
    );
  }

  lines.push("END:VCALENDAR");

  downloadFile(
    `acadence-${state.selectedSemester}.ics`,
    lines.join("\r\n"),
    "text/calendar"
  );
}

function exportDayCountCsv() {
  const course = findCourse(state.dayCountCourseId);

  if (!course) return;

  const rows = [
    [
      "Date",
      "Weekday",
      "Meeting number",
      "Status",
      "Online",
      "Makeup",
      "Activities"
    ]
  ];

  for (const meeting of meetingDetails(course)) {
    const activities = state.activities
      .filter(
        activity =>
          activity.courseId === course.id &&
          activity.date === meeting.date
      )
      .map(activity => activity.title)
      .join("; ");

    rows.push([
      meeting.date,
      formatDate(meeting.date, { weekday:"long" }),
      meeting.count || "",
      meeting.status,
      meeting.online ? "Yes" : "No",
      meeting.makeup ? "Yes" : "No",
      activities
    ]);
  }

  const csv = rows
    .map(row =>
      row.map(value =>
        `"${String(value).replace(/"/g, '""')}"`
      ).join(",")
    )
    .join("\n");

  downloadFile(
    `acadence-${course.code.replace(/\s+/g, "-")}-daycount.csv`,
    csv,
    "text/csv"
  );
}

/* -------------------------------------------------------------
   Academic-calendar administration
------------------------------------------------------------- */

function mapCalendarItems(items = []) {
  if (!Array.isArray(items)) return items || {};

  return Object.fromEntries(
    items
      .filter(item => item?.date)
      .map(item => [
        item.date,
        String(item.label || item.text || "").trim()
      ])
  );
}

function normalizeUploadedCalendars(raw) {
  const calendars =
    Array.isArray(raw)
      ? raw
      : Array.isArray(raw?.calendars)
        ? raw.calendars
        : raw?.id
          ? [raw]
          : [];

  if (!calendars.length) {
    throw new Error(
      "The JSON file must contain a calendars array."
    );
  }

  const normalized = {};

  for (const calendar of calendars) {
    const id = String(calendar.id || "")
      .trim()
      .toLowerCase();

    if (!/^[a-z][a-z0-9-]{2,31}$/.test(id)) {
      throw new Error(
        `Invalid calendar ID: ${id || "(missing)"}`
      );
    }

    for (const field of [
      "label",
      "start",
      "lastClass",
      "finalsStart",
      "finalsEnd"
    ]) {
      if (!calendar[field]) {
        throw new Error(`${id}: ${field} is required.`);
      }
    }

    const partialNoClass = {};

    if (Array.isArray(calendar.partialNoClass)) {
      for (const item of calendar.partialNoClass) {
        if (!item?.date) continue;

        partialNoClass[item.date] = {
          after:String(item.after || ""),
          label:String(item.label || item.text || "").trim()
        };
      }
    } else {
      Object.assign(
        partialNoClass,
        calendar.partialNoClass || {}
      );
    }

    const important = (calendar.important || []).map(item =>
      Array.isArray(item)
        ? item
        : [
            item.date,
            String(item.label || item.text || "").trim()
          ]
    );

    normalized[id] = {
      label:String(calendar.label).trim(),
      start:calendar.start,
      lastClass:calendar.lastClass,
      finalsStart:calendar.finalsStart,
      finalsEnd:calendar.finalsEnd,
      finalGradesDue:
        calendar.finalGradesDue ||
        `${calendar.finalsEnd}T12:00:00`,
      noClass:mapCalendarItems(calendar.noClass),
      onlineDays:mapCalendarItems(calendar.onlineDays),
      partialNoClass,
      important
    };
  }

  return normalized;
}

async function uploadAcademicCalendars(calendars) {
  if (!isAdmin) {
    throw new Error("Administrator access is required.");
  }

  const entries = Object.entries(calendars);

  if (!entries.length) {
    throw new Error("No calendars were found.");
  }

  const batch = writeBatch(db);
  const now = Date.now();

  for (const [calendarId, calendar] of entries) {
    batch.set(
      doc(db, "acadenceAcademicCalendars", calendarId),
      {
        ...calendar,
        calendarId,
        schemaVersion:1,
        updatedAt:serverTimestamp(),
        updatedAtMs:now,
        updatedBy:currentUser.email
      },
      { merge:false }
    );
  }

  await batch.commit();
  await loadSharedAcademicCalendars();
  renderAll();

  return entries.length;
}

/* -------------------------------------------------------------
   Event delegation
------------------------------------------------------------- */

document.addEventListener("click", event => {
  const viewButton = event.target.closest("[data-view]");

  if (viewButton) {
    setView(viewButton.dataset.view);
    return;
  }

  const addType = event.target.closest("[data-add]")?.dataset.add;

  if (addType) {
    openModal(addType);
    return;
  }

  const addTaskDate =
    event.target.closest("[data-add-task-date]")
      ?.dataset.addTaskDate;

  if (addTaskDate) {
    openModal("task", {
      plannedDate:addTaskDate,
      dueDate:addTaskDate
    });
    return;
  }

  const addActivityDate =
    event.target.closest("[data-add-activity-date]")
      ?.dataset.addActivityDate;

  if (addActivityDate) {
    openModal("activity", { date:addActivityDate });
    return;
  }

  const addActivityCourse =
    event.target.closest("[data-add-activity-course]")
      ?.dataset.addActivityCourse;

  if (addActivityCourse) {
    openModal("activity", {
      courseId:addActivityCourse,
      date:state.selectedDate
    });
    return;
  }

  const editCourseId =
    event.target.closest("[data-edit-course]")
      ?.dataset.editCourse;

  if (editCourseId) {
    openModal("course", findCourse(editCourseId));
    return;
  }

  const editBlockId =
    event.target.closest("[data-edit-block]")
      ?.dataset.editBlock;

  if (editBlockId) {
    openModal("block", findBlock(editBlockId));
    return;
  }

  const editTaskId =
    event.target.closest("[data-edit-task]")
      ?.dataset.editTask;

  if (editTaskId) {
    openModal(
      "task",
      state.tasks.find(task => task.id === editTaskId)
    );
    return;
  }

  const editActivityId =
    event.target.closest("[data-edit-activity]")
      ?.dataset.editActivity;

  if (editActivityId) {
    openModal(
      "activity",
      state.activities.find(
        activity => activity.id === editActivityId
      )
    );
    return;
  }

  const date =
    event.target.closest("[data-date]")?.dataset.date ||
    event.target.closest("[data-open-date]")?.dataset.openDate;

  if (date) {
    openDayDrawer(date);
    return;
  }

  if (
    event.target.closest("[data-close-drawer]") ||
    event.target.id === "drawerBackdrop"
  ) {
    closeDayDrawer();
    return;
  }

  if (
    event.target.closest("[data-close-modal]") ||
    event.target === $("#modalBackdrop")
  ) {
    closeModal();
    return;
  }

  const plannerMode =
    event.target.closest("[data-planner-mode]")
      ?.dataset.plannerMode;

  if (plannerMode) {
    state.plannerMode = plannerMode;
    saveState();
    return;
  }

  const navigationAmount =
    event.target.closest("[data-planner-navigate]")
      ?.dataset.plannerNavigate;

  if (navigationAmount) {
    const amount = Number(navigationAmount);

    if (state.plannerMode === "month") {
      const [year, month] = state.selectedMonth
        .split("-")
        .map(Number);

      const target = new Date(year, month - 1 + amount, 1);

      state.selectedMonth =
        `${target.getFullYear()}-` +
        `${String(target.getMonth() + 1).padStart(2, "0")}`;
    } else {
      state.selectedDate = addDays(
        state.selectedDate,
        state.plannerMode === "week"
          ? amount * 7
          : amount
      );
    }

    saveState();
    return;
  }

  if (event.target.closest("#plannerTodayButton")) {
    state.selectedDate = TODAY;
    state.selectedMonth = TODAY.slice(0, 7);
    saveState();
    showToast(`Showing ${formatDate(TODAY, {
      month:"long",
      day:"numeric",
      year:"numeric"
    })}.`);
    return;
  }

  const menuCourseId =
    event.target.closest("[data-toggle-course-menu]")
      ?.dataset.toggleCourseMenu;

  if (menuCourseId) {
    $$(".course-menu").forEach(menu => {
      const shouldOpen =
        menu.id === `courseMenu_${menuCourseId}` &&
        !menu.classList.contains("open");

      menu.classList.toggle("open", shouldOpen);
    });

    return;
  }

  const deleteCourseId =
    event.target.closest("[data-delete-course]")
      ?.dataset.deleteCourse;

  if (deleteCourseId) {
    deleteCourse(deleteCourseId);
    return;
  }

  const duplicateCourseId =
    event.target.closest("[data-duplicate-course]")
      ?.dataset.duplicateCourse;

  if (duplicateCourseId) {
    const original = findCourse(duplicateCourseId);

    if (original) {
      const copy = structuredClone(original);
      copy.id = uniqueId("course");
      copy.code = `${copy.code} copy`;

      state.courses.push(copy);
      saveState();
      showToast("Course duplicated.");
    }

    return;
  }

  const dayCountCourseId =
    event.target.closest("[data-daycount-course]")
      ?.dataset.daycountCourse;

  if (dayCountCourseId) {
    state.dayCountCourseId = dayCountCourseId;
    state.currentView = "daycount";
    saveState();
    return;
  }

  const courseTasksId =
    event.target.closest("[data-course-tasks]")
      ?.dataset.courseTasks;

  if (courseTasksId) {
    state.search = findCourse(courseTasksId)?.code || "";
    state.taskFilter = "open";
    state.currentView = "tasks";
    $("#globalSearch").value = state.search;
    saveState();
    return;
  }

  const morePanel =
    event.target.closest("[data-more-panel]")
      ?.dataset.morePanel;

  if (morePanel) {
    state.morePanel = morePanel;
    state.currentView = "more";
    saveState();

    setTimeout(
      () => $("#morePanel")?.scrollIntoView({
        behavior:"smooth",
        block:"start"
      }),
      20
    );

    return;
  }

  const taskFilter =
    event.target.closest("[data-task-filter]")
      ?.dataset.taskFilter;

  if (taskFilter) {
    state.taskFilter = taskFilter;
    saveState();
    return;
  }

  const dayCountLayout =
    event.target.closest("[data-daycount-layout]")
      ?.dataset.daycountLayout;

  if (dayCountLayout) {
    state.dayCountLayout = dayCountLayout;
    saveState();
    return;
  }

  const reflectionMeeting =
    event.target.closest("[data-reflection-meeting]")
      ?.dataset.reflectionMeeting;

  if (reflectionMeeting) {
    const [courseId, date] = reflectionMeeting.split("|");
    const meeting = {
      ...findCourse(courseId),
      date
    };

    $$("[data-reflection-meeting]").forEach(button => {
      button.classList.toggle(
        "active",
        button.dataset.reflectionMeeting === reflectionMeeting
      );
    });

    $("#reflectionForm").innerHTML = reflectionForm(meeting);
    return;
  }

  const choiceButton = event.target.closest(".choice-button");

  if (choiceButton) {
    choiceButton.parentElement
      .querySelectorAll(".choice-button")
      .forEach(button => button.classList.remove("active"));

    choiceButton.classList.add("active");
    return;
  }

  const cancellationValue =
    event.target.closest("[data-toggle-cancellation]")
      ?.dataset.toggleCancellation;

  if (cancellationValue) {
    const [courseId, date] = cancellationValue.split("|");
    const key = cancellationKey(courseId, date);

    if (state.cancellations[key]) {
      delete state.cancellations[key];
    } else {
      state.cancellations[key] = "Cancelled by instructor";
    }

    saveState(false);
    renderAll();
    openDayDrawer(date);
    return;
  }

  const makeupCourseId =
    event.target.closest("[data-add-makeup]")
      ?.dataset.addMakeup;

  if (makeupCourseId) {
    openModal("makeup", { courseId:makeupCourseId });
    return;
  }

  const deleteTaskId =
    event.target.closest("[data-delete-task]")
      ?.dataset.deleteTask;

  if (deleteTaskId) {
    state.tasks = state.tasks.filter(
      task => task.id !== deleteTaskId
    );

    closeModal();
    saveState();
    showToast("Task deleted.");
    return;
  }

  const deleteActivityId =
    event.target.closest("[data-delete-activity]")
      ?.dataset.deleteActivity;

  if (deleteActivityId) {
    state.activities = state.activities.filter(
      activity => activity.id !== deleteActivityId
    );

    closeModal();
    saveState();
    showToast("Activity deleted.");
    return;
  }

  const deleteSeriesId =
    event.target.closest("[data-delete-activity-series]")
      ?.dataset.deleteActivitySeries;

  if (
    deleteSeriesId &&
    confirm("Delete every activity in this recurring series?")
  ) {
    state.activities = state.activities.filter(
      activity => activity.seriesId !== deleteSeriesId
    );

    closeModal();
    saveState();
    showToast("Recurring series deleted.");
    return;
  }

  const deleteBlockId =
    event.target.closest("[data-delete-block]")
      ?.dataset.deleteBlock;

  if (
    deleteBlockId &&
    confirm("Delete this recurring block?")
  ) {
    state.blocks = state.blocks.filter(
      block => block.id !== deleteBlockId
    );

    saveState();
    return;
  }

  const customDate =
    event.target.closest("[data-delete-custom-date]")
      ?.dataset.deleteCustomDate;

  if (customDate) {
    delete state.customNoClass[customDate];
    saveState();
    return;
  }

  if (event.target.closest("#autoScheduleButton")) {
    autoScheduleTasks();
    return;
  }

  if (event.target.closest("#balanceWeekButton")) {
    balanceCurrentWeek();
    return;
  }

  if (event.target.closest("#saveReflectionButton")) {
    saveReflection();
    return;
  }

  if (
    event.target.closest("#printPlannerButton") ||
    event.target.closest("#printCurrentPlanner")
  ) {
    printWindow(
      `Acadence ${
        state.plannerMode[0].toUpperCase() +
        state.plannerMode.slice(1)
      } Plan`,
      plannerExportBody(),
      ["month","week","semester"].includes(state.plannerMode)

    event.target.closest("#printSchedulePanelButton") ||
    event.target.closest("#printWeeklySchedule")

    printWindow(
      "Weekly Faculty Schedule",
      weeklyScheduleHtml(),
      true
    );
    return;

    event.target.closest("#printTasksButton") ||
    event.target.closest("#printTaskList")
